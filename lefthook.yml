skip_output: true

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      # Apply safe auto-fixes and re-stage; || true ensures we never block a commit
      run: bunx biome check --write --no-errors-on-unmatched {staged_files} || true
      stage_fixed: true
    no-fake-data:
      glob: "*.{ts,tsx}"
      # BLOCKING: exits non-zero if staged files introduce fake-data sentinels.
      # Sanctioned exceptions live in the script itself (network-service, weather-service).
      run: bash scripts/check-fake-data.sh {staged_files}
    no-ofelia:
      glob: "*.{ts,tsx,js,mjs,json,yml,yaml,md,sh,toml}"
      # BLOCKING: rejects reintroduction of Ofelia (replaced by the bosun
      # scheduler, CC-79k). The token is sanctioned only in the guard script itself.
      run: bash scripts/check-no-ofelia.sh {staged_files}
    no-home-address:
      # BLOCKING: rejects the private home-location name (any casing) so the home
      # address never re-enters the public repo. The blocked pattern is
      # base64-encoded inside the script so the name is never spelled out. Real
      # values live in 1Password (HOME_* env). See CC-3zi / CC-d3j.
      run: bash scripts/check-no-home-address.sh {staged_files}
    gitleaks:
      # BLOCKING: scans the staged diff for secrets (prefixed tokens, private
      # keys, high-entropy strings). Config + allowlist live in .gitleaks.toml.
      # Keeps credentials in 1Password only, especially ahead of going public (CC-4ma).
      run: gitleaks git --staged --no-banner -c .gitleaks.toml
    # NOTE: badge JSON (.github/badges/*) is refreshed ONLY by the CI test job
    # (`bun run badges` → commit "[skip ci]" on main), never per-commit. A
    # pre-commit `git add` of generated badges baked churn into every feature
    # commit and conflicted on every worktree→main merge (CC-w6j2.8). CI keeps
    # all four badges (files/loc/commit/coverage) current on main.

commit-msg:
  commands:
    conventional-commit:
      # BLOCKING: subject must be a Conventional Commit AND reference a real bd
      # ticket id (validated via `bd show`). Degrades gracefully when bd is offline.
      # {1} is the path to the commit message file lefthook passes to this stage.
      run: bash scripts/check-commit-msg.sh {1}

pre-push:
  # piped: run commands sequentially in priority order and ABORT the chain on the
  # first failure. This is what makes biome-lint truly fail-fast: when it fails,
  # beads-sync is skipped entirely, so we never pay the slow (~15-90s) dolt push
  # for code that's about to be rejected (CC-lh1a). Without piped, lefthook runs
  # every command regardless of earlier failures (priority only reorders them).
  piped: true
  commands:
    biome-lint:
      # Runs FIRST (priority 1). Combined with `piped: true` above, a lint failure
      # here aborts the push before beads-sync runs, instead of relying on the
      # alphabetical accident ('beads-sync' would otherwise sort first and run the
      # slow dolt push even on a doomed push).
      priority: 1
      # BLOCKING: mirror CI's `biome check .` lint gate so a lint regression can
      # never reach the remote (CI runs the same check and `deploy` depends on it,
      # so a push that fails lint just breaks main). The pre-commit `format` step
      # only auto-fixes STAGED files and is glob-limited (no HTML), so an already-
      # committed or non-staged lint error slips through — exactly how a tracked
      # experiments/*.html broke CI (CC-goat). Scoped to TRACKED files (git
      # ls-files) so it sees precisely what CI's clean checkout sees and never
      # trips on untracked local WIP. biome.json includes still apply.
      run: |
        git ls-files -z -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.mjs' '*.cjs' '*.json' '*.jsonc' '*.css' '*.html' \
          | xargs -0 bunx biome check --no-errors-on-unmatched
    knip-deadcode:
      # Runs AFTER biome-lint (priority 2), BEFORE the slow beads-sync. BLOCKING:
      # the dead-code ratchet (scripts/check-knip.sh) fails the push when any knip
      # finding category grew beyond .knip-baseline.json (new dead code) or shrank
      # without the baseline being lowered. Mirrors CI's `test` job so a regression
      # can't reach main. Mechanical replacement for an agentic dead-code sweep
      # (CC-k6p1): `bun run knip` to inspect, `bun run knip:fix` to auto-remove,
      # `bun run knip:baseline` after a cleanup. Piped chain → a failure here aborts
      # before the slow dolt push runs.
      priority: 2
      run: bash scripts/check-knip.sh
    beads-sync:
      # Runs AFTER knip-deadcode (priority 3) and only if it passed (piped chain),
      # so we pay the slow dolt push exactly once the code push has cleared lint.
      priority: 3
      # NON-BLOCKING: publish beads issue history (refs/dolt/data) to origin
      # alongside the code being pushed. This is the durable sync channel
      # (CC-sg4p); `dolt.auto-push` is intentionally OFF because per-write
      # auto-pushes livelock under parallel agents contending on the shared
      # parent .git. Sync rides here instead — once per `git push`, batched.
      # A sync failure warns but never blocks the code push (run it manually
      # with `bd dolt push`). Skips cleanly if bd isn't installed.
      run: |
        command -v bd >/dev/null 2>&1 || exit 0
        timeout 90 bd dolt push || echo "beads: 'bd dolt push' failed/timed out — issues NOT synced; run it manually with 'bd dolt push'" >&2
        exit 0

post-merge:
  commands:
    beads-pull:
      # NON-BLOCKING: pull beads issue history from origin after `git pull`/merge
      # so the local Dolt DB tracks teammates' issue changes. Failure warns only.
      run: |
        command -v bd >/dev/null 2>&1 || exit 0
        timeout 90 bd dolt pull || echo "beads: 'bd dolt pull' failed/timed out — run it manually with 'bd dolt pull'" >&2
        exit 0

post-checkout:
  commands:
    beads-sync:
      # NON-BLOCKING: beads' own branch-aware post-checkout logic ({1}=prev-HEAD
      # {2}=new-HEAD {3}=1 for a branch checkout, 0 for a file checkout — bd skips
      # file checkouts itself, so no pull on `git checkout -- file`).
      run: |
        command -v bd >/dev/null 2>&1 || exit 0
        BD_GIT_HOOK=1 timeout 90 bd hooks run post-checkout {1} {2} {3} || true
        exit 0

prepare-commit-msg:
  commands:
    beads-identity:
      # NON-BLOCKING: beads adds agent identity trailers to the commit BODY (for
      # forensics). It does not touch the subject, so the commit-msg conventional-
      # commit guard still passes. {1}=msg file {2}=source {3}=commit sha.
      run: |
        command -v bd >/dev/null 2>&1 || exit 0
        BD_GIT_HOOK=1 bd hooks run prepare-commit-msg {1} {2} {3} || true
        exit 0
