skip_output: true

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      # Apply safe auto-fixes and re-stage; || true ensures we never block a commit
      run: bunx biome check --write --no-errors-on-unmatched {staged_files} || true
      stage_fixed: true
    no-fake-data:
      glob: "*.{ts,tsx}"
      # BLOCKING: exits non-zero if staged files introduce fake-data sentinels.
      # Sanctioned exceptions live in the script itself (network-service, weather-service).
      run: bash scripts/check-fake-data.sh {staged_files}
    no-ofelia:
      glob: "*.{ts,tsx,js,mjs,json,yml,yaml,md,sh,toml}"
      # BLOCKING: rejects reintroduction of Ofelia (replaced by the bosun
      # scheduler, CC-79k). The token is sanctioned only in the guard script itself.
      run: bash scripts/check-no-ofelia.sh {staged_files}
    no-home-address:
      # BLOCKING: rejects the private home-location name (any casing) so the home
      # address never re-enters the public repo. The blocked pattern is
      # base64-encoded inside the script so the name is never spelled out. Real
      # values live in 1Password (HOME_* env). See CC-3zi / CC-d3j.
      run: bash scripts/check-no-home-address.sh {staged_files}
    gitleaks:
      # BLOCKING: scans the staged diff for secrets (prefixed tokens, private
      # keys, high-entropy strings). Config + allowlist live in .gitleaks.toml.
      # Keeps credentials in 1Password only, especially ahead of going public (CC-4ma).
      run: gitleaks git --staged --no-banner -c .gitleaks.toml
    loc-badge:
      # Non-blocking: refresh the self-hosted LOC badge (.github/badges/loc.json)
      # from real git-tracked line counts so it never goes stale. Rounded to whole
      # 'k', so this only re-stages on a real boundary cross (rare, low churn).
      # Coverage badge is refreshed by the CI test job, not here (too slow for
      # every commit). See scripts/gen-badges.ts (CC-afz).
      run: bun scripts/gen-badges.ts --loc-only && git add .github/badges/loc.json

commit-msg:
  commands:
    conventional-commit:
      # BLOCKING: subject must be a Conventional Commit AND reference a real bd
      # ticket id (validated via `bd show`). Degrades gracefully when bd is offline.
      # {1} is the path to the commit message file lefthook passes to this stage.
      run: bash scripts/check-commit-msg.sh {1}

pre-push:
  commands:
    beads-sync:
      # NON-BLOCKING: publish beads issue history (refs/dolt/data) to origin
      # alongside the code being pushed. This is the durable sync channel
      # (CC-sg4p); `dolt.auto-push` is intentionally OFF because per-write
      # auto-pushes livelock under parallel agents contending on the shared
      # parent .git. Sync rides here instead — once per `git push`, batched.
      # A sync failure warns but never blocks the code push (run it manually
      # with `bd dolt push`). Skips cleanly if bd isn't installed.
      run: |
        command -v bd >/dev/null 2>&1 || exit 0
        timeout 90 bd dolt push || echo "beads: 'bd dolt push' failed/timed out — issues NOT synced; run it manually with 'bd dolt push'" >&2
        exit 0

post-merge:
  commands:
    beads-pull:
      # NON-BLOCKING: pull beads issue history from origin after `git pull`/merge
      # so the local Dolt DB tracks teammates' issue changes. Failure warns only.
      run: |
        command -v bd >/dev/null 2>&1 || exit 0
        timeout 90 bd dolt pull || echo "beads: 'bd dolt pull' failed/timed out — run it manually with 'bd dolt pull'" >&2
        exit 0
