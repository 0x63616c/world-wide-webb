name: control-center
runtime:
  name: nodejs
  options:
    # Pulumi runs the program with bun (the repo's runtime); no separate compile.
    typescript: false
    nodeargs: ""
description: >
  control-center k3s cluster stack on OrbStack Kubernetes, managed by Pulumi
  (www-j934): ESO, CNPG, cert-manager, the app workloads + CronJobs. State in
  Pulumi Cloud under Calum's personal account.
main: program.ts
