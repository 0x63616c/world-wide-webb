name: Deploy drift watchdog

# Backstop for the deploy-marker scheme (CC-bom8): if main is ahead of
# refs/deploy/main and no CI run is active on main, e.g. every run got
# cancelled by rapid pushes, or a run died to a transient failure, kick a
# selective CI run (force_all=false: build only what drifted). Prod then
# converges to main within ~30 minutes instead of stalling until the next
# coincidental app-path commit.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch a selective CI run when the marker is behind main
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          main=$(gh api "repos/$REPO/git/ref/heads/main" -q .object.sha)
          marker=$(gh api "repos/$REPO/git/ref/deploy/main" -q .object.sha 2>/dev/null || true)
          if [ -z "$marker" ]; then
            echo "No deploy marker yet (pre-seed); nothing to reconcile."
            exit 0
          fi
          if [ "$marker" = "$main" ]; then
            echo "Marker is current ($main); prod reflects main."
            exit 0
          fi
          inflight=$(gh run list --repo "$REPO" --workflow CI --branch main --limit 20 \
            --json status -q '[.[] | select(.status == "in_progress" or .status == "queued")] | length')
          if [ "$inflight" -gt 0 ]; then
            echo "Drift exists but $inflight CI run(s) in flight on main; letting them finish."
            exit 0
          fi
          echo "Drift: marker=$marker main=$main, no CI in flight, dispatching selective run."
          gh workflow run ci.yml --repo "$REPO" --ref main -f force_all=false
