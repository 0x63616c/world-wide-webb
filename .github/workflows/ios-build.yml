# Builds the iOS Capacitor kiosk shell (products/control-center/web/ios) and uploads it to TestFlight.
# The app is a thin native wrapper that loads https://dashboard.worldwidewebb.co at
# runtime (products/control-center/web/capacitor.config.ts), so this only needs to ship when the native
# shell changes , plus a monthly cron to refresh the 90-day TestFlight build expiry.
# It targets the same bundle id as the original "Evee" app, so builds land as updates
# to the existing TestFlight app (was 1.0, build 48). Signing reuses fastlane match
# against github.com/0x63616c/certificates. Secrets from SOPS vault (CC-k8t7).
name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - "products/control-center/web/ios/**"
      - "products/control-center/web/capacitor.config.ts"
      - "products/control-center/web/package.json"
      - ".github/workflows/ios-build.yml"
  schedule:
    - cron: "0 12 1 * *" # 1st of every month at noon UTC , keeps the TestFlight build fresh (90-day expiry)
  workflow_dispatch:
    inputs:
      regenerate_profiles:
        description: >-
          Regenerate the provisioning profile instead of reusing the cached one.
          Needed for ONE run after an App ID capability changes (which marks
          existing profiles Invalid); a normal readonly build would otherwise
          ship a binary missing the new entitlement.
        type: boolean
        default: false

concurrency:
  group: ios-build
  cancel-in-progress: true

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 20
    # Protected environment: AGE_PRIVATE_KEY is gated here (CC-k8t7).
    environment: prod
    defaults:
      run:
        working-directory: products/control-center/web/ios
    steps:
      - uses: actions/checkout@v4

      # Decrypt vault — the only step touching AGE_PRIVATE_KEY. No set -x here.
      - name: Decrypt vault (SOPS+age)
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        run: |
          brew install sops age 2>/dev/null || true

          extract() { sops -d "$GITHUB_WORKSPACE/secrets/vault.yaml" | grep "^$1:" | cut -d' ' -f2-; }

          MATCH_PWD=$(extract APP_STORE_CONNECT_API__MATCH_PASSWORD)
          GIT_AUTH=$(extract MATCH_GIT_BASIC_AUTHORIZATION)
          KEY_ID=$(extract APP_STORE_CONNECT_API__KEY_ID)
          ISSUER_ID=$(extract APP_STORE_CONNECT_API__ISSUER_ID)
          P8=$(extract APP_STORE_CONNECT_API__P8_CONTENT)
          CF_ID=$(extract CF_ACCESS_KIOSK_TOKEN__CLIENT_ID)
          CF_SECRET=$(extract CF_ACCESS_KIOSK_TOKEN__CLIENT_SECRET)

          echo "::add-mask::$MATCH_PWD"
          echo "::add-mask::$GIT_AUTH"
          echo "::add-mask::$KEY_ID"
          echo "::add-mask::$ISSUER_ID"
          echo "::add-mask::$P8"
          echo "::add-mask::$CF_ID"
          echo "::add-mask::$CF_SECRET"

          echo "MATCH_PASSWORD=$MATCH_PWD" >> "$GITHUB_ENV"
          echo "MATCH_GIT_BASIC_AUTHORIZATION=$GIT_AUTH" >> "$GITHUB_ENV"
          echo "ASC_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          echo "ASC_ISSUER_ID=$ISSUER_ID" >> "$GITHUB_ENV"
          echo "ASC_KEY_CONTENT=$P8" >> "$GITHUB_ENV"
          echo "CF_ACCESS_KIOSK_CLIENT_ID=$CF_ID" >> "$GITHUB_ENV"
          echo "CF_ACCESS_KIOSK_CLIENT_SECRET=$CF_SECRET" >> "$GITHUB_ENV"
          echo "MATCH_GIT_URL=https://github.com/0x63616c/certificates.git" >> "$GITHUB_ENV"

      # Fail fast on a regression in the kiosk recovery logic (www-bwoy) before
      # the expensive web build + TestFlight upload. Pure swiftc, no deps.
      - name: Kiosk recovery-logic guard
        run: ./scripts/test-kiosk-health.sh

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build web
        run: bun run build
        working-directory: products/control-center/web

      - name: Capacitor sync
        run: bunx cap sync ios
        working-directory: products/control-center/web

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: products/control-center/web/ios

      # The entitlement must be declared in the project, not just permitted by
      # the provisioning profile. Build 77 shipped with a valid push-enabled
      # profile but no entitlements file, so the binary never claimed
      # aps-environment and APNs returned no token - with a fully green build.
      # Fail here rather than discover it on a device again.
      - name: Guard aps-environment entitlement
        working-directory: products/control-center/web/ios/App
        run: |
          set -euo pipefail
          test -f App/App.entitlements \
            || { echo "::error::App/App.entitlements is missing - push cannot work"; exit 1; }
          grep -q "aps-environment" App/App.entitlements \
            || { echo "::error::aps-environment key absent from App.entitlements"; exit 1; }
          grep -q "CODE_SIGN_ENTITLEMENTS = App/App.entitlements;" App.xcodeproj/project.pbxproj \
            || { echo "::error::CODE_SIGN_ENTITLEMENTS not wired in project.pbxproj"; exit 1; }
          # The entitlement alone is not enough: iOS hands the APNs token to the
          # AppDelegate, and the Capacitor plugin only sees it if the delegate
          # forwards it as an NSNotification. Missing these is silent on EVERY
          # path - no token, no error, no log - so assert them here.
          grep -q "didRegisterForRemoteNotificationsWithDeviceToken" App/AppDelegate.swift \
            || { echo "::error::AppDelegate is not forwarding the APNs token to Capacitor"; exit 1; }
          grep -q "didFailToRegisterForRemoteNotificationsWithError" App/AppDelegate.swift \
            || { echo "::error::AppDelegate is not forwarding APNs registration errors"; exit 1; }
          echo "aps-environment entitlement present and wired; AppDelegate forwards APNs callbacks"

      - name: Build and upload to TestFlight
        run: bundle exec fastlane release
        env:
          # All from GITHUB_ENV set by "Decrypt vault" step.
          MATCH_PASSWORD: ${{ env.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ env.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_GIT_URL: ${{ env.MATCH_GIT_URL }}
          ASC_KEY_ID: ${{ env.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ env.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ env.ASC_KEY_CONTENT }}
          CF_ACCESS_KIOSK_CLIENT_ID: ${{ env.CF_ACCESS_KIOSK_CLIENT_ID }}
          CF_ACCESS_KIOSK_CLIENT_SECRET: ${{ env.CF_ACCESS_KIOSK_CLIENT_SECRET }}
          MATCH_REGENERATE: ${{ inputs.regenerate_profiles }}

      # The source-level guard above proves intent; this proves the SIGNED
      # BINARY actually carries the entitlement. Reads it back out of the built
      # .ipa with codesign, which is the only statement about the artifact that
      # is not an inference. Runs after upload (fastlane builds and uploads in
      # one lane), so it cannot prevent a bad upload - it makes one loud.
      - name: Verify aps-environment in the built binary
        working-directory: products/control-center/web/ios
        run: |
          set -uo pipefail
          # NOT `set -e`: a failing `find`/`ls` must reach the explicit checks
          # below rather than killing the step with no diagnostic. The first
          # version of this guard died silently on exactly that.
          # gym writes to build/ (output_directory in the Fastfile), but search
          # the whole tree so relocating it can't silently skip verification.
          ipa=$(find . -name "*.ipa" -not -path "*/DerivedData/*" 2>/dev/null | head -1)
          if [ -z "$ipa" ]; then
            echo "::error::no .ipa found under $(pwd) - cannot verify entitlements"
            find . -maxdepth 3 -type d -name build 2>/dev/null
            exit 1
          fi
          echo "verifying $ipa"
          rm -rf _verify && mkdir _verify
          unzip -q "$ipa" -d _verify || { echo "::error::could not unzip $ipa"; exit 1; }
          app=$(find _verify/Payload -maxdepth 1 -name "*.app" 2>/dev/null | head -1)
          if [ -z "$app" ]; then
            echo "::error::no .app inside $ipa"
            exit 1
          fi
          ents=$(codesign -d --entitlements :- "$app" 2>/dev/null || true)
          echo "$ents" | grep -q "aps-environment" || {
            echo "::error::signed binary has NO aps-environment - push will silently fail"
            echo "$ents"
            exit 1
          }
          echo "$ents" | grep -A1 "aps-environment"
          rm -rf _verify
