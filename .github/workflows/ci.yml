name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  # Manual trigger: rebuild + (on main) redeploy on demand. Useful for a forced
  # redeploy or to re-run after a transient infra failure. force_all=true
  # rebuilds every image and runs `pulumi up`; force_all=false falls back to the
  # path-filter diff (the www-bom8 deploy marker is retired, `pulumi up` converges
  # the declared stack on every green run, so no drift-tracking dispatch exists).
  workflow_dispatch:
    inputs:
      force_all:
        description: "Rebuild every image and redeploy (pulumi up); false = diff-only"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

# Stop a superseded push from running builds in parallel: a newer push to the
# same ref cancels the in-progress run instantly instead of letting both burn
# runner minutes. Combined with per-job timeout-minutes below, this caps the
# Actions-minute blast radius of rapid pushes and hung builds (www-c0m).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Determine which apps actually changed so we only rebuild what's needed.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
      mediaworker: ${{ steps.filter.outputs.mediaworker }}
      storybook: ${{ steps.filter.outputs.storybook }}
      drizzle: ${{ steps.filter.outputs.drizzle }}
      captiveportal: ${{ steps.filter.outputs.captiveportal }}
      textyourex: ${{ steps.filter.outputs.textyourex }}
      amp: ${{ steps.filter.outputs.amp }}
      mapprovision: ${{ steps.filter.outputs.mapprovision }}
      # infra-only changes (Pulumi program / specs) deploy without any image
      # rebuild: a `pulumi up` must still converge the declared stack.
      infra: ${{ steps.filter.outputs.infra }}
      any_app: ${{ steps.filter.outputs.any_app }}
    steps:
      - uses: actions/checkout@v4

      # No deploy-marker baseline (www-j934.14): `pulumi up` is
      # declarative-convergent, so the latest green run always reconciles the
      # whole declared stack to the committed digests, the `refs/deploy/main`
      # marker that kept Swarm's push-range model from stranding commits is
      # obsolete. dorny defaults to the push range on same-branch pushes and the
      # default-branch diff on feature branches, which is exactly what we want.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Shared changes (packages or root lockfile) force a rebuild of everything.
            # Control Center product-boundary changes rebuild the Control Center
            # images, but unrelated product folders do not.
            # NOTE: do NOT use '!negation' list items here. dorny/paths-filter OR-matches
            # each list entry, and a '!foo/**' pattern matches every file that ISN'T under
            # foo, so '!products/control-center/web/.storybook/**' matched docs/api/everything and made web
            # rebuild on every push (it broke ac_ci_selective: docs-only built web). The
            # web image build already ignores .storybook, so a positive-only list is both
            # correct and conservative; a rare .storybook-only edit harmlessly rebuilds web.
            web:
              - 'products/control-center/web/**'
              - 'products/control-center/**'
              - 'packages/**'
              - 'bun.lock'
            api:
              - 'products/control-center/api/**'
              - 'products/control-center/**'
              - 'packages/**'
              - 'bun.lock'
            # The worker bundles its domain cycles from @control-center/api, so an products/control-center/api
            # change must rebuild the worker image too (www-xjba).
            worker:
              - 'products/control-center/worker/**'
              - 'products/control-center/api/**'
              - 'products/control-center/**'
              - 'packages/**'
              - 'bun.lock'
            # media-worker bundles its domain code from @control-center/api, so an products/control-center/api
            # change must rebuild it too (same rule as worker, www-kp4k).
            mediaworker:
              - 'products/control-center/media-worker/**'
              - 'products/control-center/api/**'
              - 'products/control-center/**'
              - 'packages/**'
              - 'bun.lock'
            storybook:
              - 'products/control-center/web/.storybook/**'
              - 'products/control-center/web/src/**'
              - 'products/control-center/web/package.json'
              - 'products/control-center/**'
              # Serving config: a change to how nginx serves the bundle (cache
              # headers, asset 404 vs index.html fallback) must rebuild the image
              # too, or the fix never ships (www-w4aa).
              - 'products/control-center/web/nginx-storybook.conf'
              - 'products/control-center/web/Dockerfile.storybook'
              # The storybook image also bundles the captive-portal Storybook (the
              # composed /captive-portal ref), so a portal change must rebuild it
              # (www-q002.2/.5).
              - 'products/captive-portal/**'
              - 'packages/**'
              - 'bun.lock'
            # infra-only changes (the Pulumi program + workload specs) deploy
            # with NO image rebuild: the deploy job runs `pulumi up`, which must
            # converge an infra-only diff (e.g. a resource cap or env change).
            infra:
              - 'infra/**'
            # Drizzle Gateway wrapper image, a thin self-contained Dockerfile +
            # preload. It pins an upstream base and copies only products/control-center/drizzle, so it
            # rebuilds solely on its own changes (no packages/ or bun.lock dep).
            drizzle:
              - 'products/control-center/drizzle/**'
              - 'products/control-center/**'
            # Captive portal: a static nginx image built solely from its own product tree
            # (the build pulls workspace deps, so the root lockfile counts too). It
            # does NOT bundle @control-center/api, it talks to the api only over HTTP via the
            # scoped nginx proxy, so an products/control-center/api change does not rebuild it
            # (www-q002.2). Its nginx.conf + Dockerfile are part of the image.
            captiveportal:
              - 'products/captive-portal/**'
              - 'bun.lock'
            # Text Your Ex: deployed product with two images (tye-api, tye-frontend).
            # Includes infra/** so a pure Pulumi change rebuilds and redeploys TYE.
            textyourex:
              - 'products/text-your-ex/**'
              - 'packages/**'
              - 'bun.lock'
              - 'infra/**'
            # AMP: a static nginx app from its product tree. It shares only root
            # workspace deps and platform packages, so unrelated product changes
            # must not rebuild it.
            amp:
              - 'products/amp/**'
              - 'packages/**'
              - 'bun.lock'
            # Basemap provisioner (www-hn1i): a self-contained alpine + pmtiles
            # CLI + sh image, no workspace deps, so it rebuilds solely on its
            # own tree (mirrors drizzle).
            mapprovision:
              - 'products/control-center/map-provision/**'
              - 'products/control-center/**'
            # any_app is true when at least one image needs to be built. An
            # infra-only change is handled by the separate `infra` filter above,
            # the deploy job fires on `any_app || infra`.
            any_app:
              - 'products/control-center/**'
              - 'packages/**'
              - 'products/amp/**'
              - 'products/text-your-ex/**'
              - 'bun.lock'

  # Test gate: typecheck + full vitest suite with coverage. Runs on every push
  # (the repo previously built and DEPLOYED without ever running tests). Deploy
  # depends on this passing. Also refreshes the self-hosted coverage/LOC badge
  # JSON and commits it back on main so the README badges stay real (www-afz).
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the badge commit can rebase cleanly onto main.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Lint (biome)
        # Lint gate in CI, not just the lefthook pre-commit hook: a --no-verify
        # bypass (or a hook that isn't installed on a contributor's machine)
        # would otherwise ship lint regressions undetected (www-355t.6).
        run: bunx biome check .
      - name: Storybook docs guard
        # Authoritative backstop for the lefthook pre-commit `storybook-docs`
        # hook (bypassable with --no-verify): fails the test job if any tracked
        # *.stories.tsx lacks an autodocs Docs page. `deploy` needs `test`, so a
        # missing doc blocks the deploy. Fast (grep), runs before the slow
        # Playwright install so it fails early (www-o0ko).
        run: bash scripts/check-storybook-docs.sh
      - name: OrbStack watchdog logic tests
        # Hermetic self-test of the docker-hang watchdog's decide/probe logic
        # (www-sizh), no real docker/OrbStack. Gates the recovery automation so a
        # regression in its thresholds/anti-loop guard can't ship silently. Fast
        # (bash), runs before the slow Playwright install. Mirrors the
        # test-kiosk-health gate in ios-build.yml.
        run: bash scripts/test-orbstack-watchdog.sh
      - name: Basemap provisioner tests
        # Hermetic self-test of the map-provision script (www-hn1i): runtime
        # build resolution (no date pin to rot), if-missing/force modes, the
        # newest→previous fallback, atomic rename, and the nginx /maps/ loud-404.
        # Stubbed curl/pmtiles, no network. Fast (bash), runs before the slow
        # Playwright install. Mirrors the orbstack-watchdog gate above.
        run: bash scripts/test-map-provision.sh
      - name: Product CI wiring guards
        run: |
          bun run test:dockerfile-manifests
          bun run test:product-workspaces
          bun run test:control-center-ci-split
          bun run check:control-center-product-boundary
          bun run test:product-ci-isolation
          bun run test:tilt-product-lanes
          bun run test:product-doc-paths
          bun run test:amp-ci-deploy
      - name: Captive-portal LAN-edge proxy topology tests
        # Hermetic self-test of the portal-lan TLS-on-:42069 + http->https
        # redirect topology (www-q002.22), no real docker. Pins that the LAN edge
        # terminates portal TLS on the neutral host port (NOT :443/:8443, both
        # OrbStack-reserved) and bounces plain :80 to https on it, so a guest
        # never lands on plaintext. Fast (bash), runs before the slow Playwright
        # install. Mirrors the orbstack-watchdog gate above.
        run: bash scripts/test-portal-lan.sh
      - name: Control Center cutover tooling tests
        # Hermetic self-tests of the M7 production-cutover tooling (www-jtp0.7):
        # the red-first preflight gate (refuses cutover until rehearsal/snapshot/
        # counts/rollback/approval present), the post-cutover smoke dry-run plan,
        # and the wall-panel health classifier (1366x1024 + CF-error/skeleton
        # markers, mirrored from iOS KioskHealth). No cluster/DB/network/secrets.
        # Fast, runs before the slow Playwright install. Mirrors the gates above.
        run: |
          bash scripts/test-cc-cutover-preflight.sh
          bash scripts/test-cc-post-cutover-smoke.sh
          node scripts/test-panel-health.mjs
      - name: Install Playwright Chromium (for Storybook browser tests)
        run: bunx playwright install --with-deps chromium
      - name: Typecheck
        run: bun run typecheck
      - name: Dead code (knip, zero-tolerance)
        # Authoritative backstop for the lefthook pre-push guard (which a
        # --no-verify bypass or an uninstalled hook can skip). knip exits non-zero
        # on ANY unused file/export/dep, the repo is held at zero dead code.
        # `deploy` needs `test`, so a regression blocks the prod deploy (www-k6p1).
        run: bunx knip
      - name: Test with coverage (unit jsdom + Storybook chromium, merged)
        run: bun run test:coverage
      - name: Regenerate badge JSON
        run: bun run badges
      - name: Commit refreshed badges (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          # Only commit when a badge actually changed. --no-verify skips the
          # local lefthook hooks (gitleaks etc. aren't installed on the runner);
          # [skip ci] stops this cosmetic commit from re-triggering the workflow.
          # All steps are best-effort so a push race never fails the test gate.
          if ! git diff --quiet -- .github/badges; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/badges
            git commit --no-verify -m "chore(ci/www-afz): refresh coverage + loc badges [skip ci]" || true
            git pull --rebase --autostash origin main || true
            git push || true
          fi

  build-web:
    needs: [changes, test]
    if: needs.changes.outputs.web == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Native arm64 runner (ubuntu-24.04-arm), no QEMU emulation. The deploy
      # target (homelab Mac Mini under OrbStack) is arm64 and nothing in prod
      # runs amd64, so images are built linux/arm64 only. Dropping the emulated
      # amd64 leg removed the 5-10x QEMU slowdown that dominated build time (www-4yt).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The Docker builder image has no .git, so the commit timestamp must be
      # computed here (where the repo is checked out) and passed in as a build-arg.
      # Unix-ms = author commit time × 1000; the badge renders "time since commit"
      # from it. Without this, vite emits "NaN" and the prod badge omits the age.
      - name: Resolve commit timestamp (unix-ms)
        run: echo "BUILD_TIME=$(( $(git show -s --format=%ct HEAD) * 1000 ))" >> "$GITHUB_ENV"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: products/control-center/web/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            BUILD_HASH=${{ github.sha }}
            BUILD_TIME=${{ env.BUILD_TIME }}
          tags: |
            ghcr.io/0x63616c/www-cc-web:${{ github.sha }}
            ghcr.io/0x63616c/www-cc-web:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-api:
