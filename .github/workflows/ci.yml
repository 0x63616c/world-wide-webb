          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push bosun-agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/bosun/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/control-center-bosun:${{ github.sha }}
            ghcr.io/0x63616c/control-center-bosun:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=bosun
          cache-to: type=gha,mode=max,scope=bosun

  build-drizzle:
    needs: [changes, test]
    if: needs.changes.outputs.drizzle == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Native arm64 runner (ubuntu-24.04-arm) — no QEMU emulation. The deploy
      # target (homelab Mac Mini under OrbStack) is arm64 and nothing in prod
      # runs amd64, so images are built linux/arm64 only. Dropping the emulated
      # amd64 leg removed the 5-10x QEMU slowdown that dominated build time (www-4yt).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
