    steps:
      - uses: actions/checkout@v4

      # Native arm64 runner (deploy target is the arm64 Mac Mini), same as the
      # other image builds; no QEMU emulation (www-4yt).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push tye-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: products/text-your-ex/Dockerfile.api
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/www-tye-api:${{ github.sha }}
            ghcr.io/0x63616c/www-tye-api:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=tye-api
          cache-to: type=gha,mode=max,scope=tye-api

  build-tye-frontend:
    needs: [changes, test]
    if: needs.changes.outputs.textyourex == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Native arm64 runner (deploy target is the arm64 Mac Mini), same as the
      # other image builds; no QEMU emulation (www-4yt).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push tye-frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: products/text-your-ex/Dockerfile.frontend
          platforms: linux/arm64
          push: true
          build-args: |
            VITE_API_BASE=https://api--tye.worldwidewebb.co
          tags: |
            ghcr.io/0x63616c/www-tye-web:${{ github.sha }}
            ghcr.io/0x63616c/www-tye-web:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=tye-frontend
          cache-to: type=gha,mode=max,scope=tye-frontend

  # After the images build on main, deploy to the homelab k3s cluster with
  # `pulumi up` (www-j934.14). The runner joins the tailnet with an EPHEMERAL
  # Tailscale key (auto-revoked when the job ends), reaches the kube-apiserver
  # over the tailnet, and runs the Pulumi program in infra/. CI is the deployer.
  #
  # Fires on `any_app || infra`: an image change OR an infra-only change (a spec
  # tweak with no rebuild) must both converge the declared stack. `pulumi up` is
  # declarative-convergent, so the latest green run always reconciles prod to the
  # committed digests, no deploy marker needed (www-bom8 retired).
  deploy:
    needs: [changes, test, build-web, build-api, build-worker, build-media-worker, build-storybook, build-drizzle, build-captive-portal, build-map-provision, build-amp, build-tye-api, build-tye-frontend]
    # always() lets us run even when some build jobs were skipped (no changes).
    # We proceed when: on main, an app OR infra changed, and no build failed.
    if: |
      always() &&
      github.ref_name == 'main' &&
      (needs.changes.outputs.any_app == 'true' || needs.changes.outputs.infra == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)) &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Protected environment: AGE_PRIVATE_KEY is scoped to this env so it never
    # appears on PR runners (CC-k8t7 age-key = skeleton key for all 114 secrets).
    environment: prod
    steps:
      - uses: actions/checkout@v4

      # Decrypt vault — the ONLY step that touches AGE_PRIVATE_KEY. Installs sops
      # + age, decrypts secrets/vault.yaml, and masks each value before exporting.
      # No set -x around this block. Values flow into subsequent steps via GITHUB_ENV.
      - name: Decrypt vault (SOPS+age)
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        run: |
          # Install sops
          curl -fsSL https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64 \
            -o /usr/local/bin/sops && chmod +x /usr/local/bin/sops
          # Install age
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz \
            | tar -xzC /usr/local/bin --strip-components=1 age/age age/age-keygen

          extract() { sops -d secrets/vault.yaml | grep "^$1:" | cut -d' ' -f2-; }

          TS_CLIENT_ID=$(extract TAILSCALE_OAUTH_CLIENT__CLIENT_ID)
          TS_CLIENT_SECRET=$(extract TAILSCALE_OAUTH_CLIENT__SECRET)
          PULUMI_TOKEN=$(extract PULUMI__ACCESS_TOKEN)
          KUBECONFIG_B64_VAL=$(extract KUBECONFIG__B64)

          echo "::add-mask::$TS_CLIENT_ID"
          echo "::add-mask::$TS_CLIENT_SECRET"
          echo "::add-mask::$PULUMI_TOKEN"
          echo "::add-mask::$KUBECONFIG_B64_VAL"

          echo "TS_OAUTH_CLIENT_ID=$TS_CLIENT_ID" >> "$GITHUB_ENV"
          echo "TS_OAUTH_SECRET=$TS_CLIENT_SECRET" >> "$GITHUB_ENV"
          echo "PULUMI_ACCESS_TOKEN=$PULUMI_TOKEN" >> "$GITHUB_ENV"
          echo "KUBECONFIG_B64=$KUBECONFIG_B64_VAL" >> "$GITHUB_ENV"
          # SOPS_AGE_KEY flows into the pulumi up step via secrets.AGE_PRIVATE_KEY

      # Read each app image's current :main digest. A pinned digest renders the
      # workload's image as @sha256:… in the Pulumi program (infra/src/services.ts
      # ghcr()), so `pulumi up` rolls ONLY the workloads whose digest changed,
      # the www-czg digest-pin guarantee, now config-driven via the Pulumi
      # program rather than an external webhook.
      - name: Log in to ghcr.io (read manifests)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect image digests
        id: digests
        run: |
          # Map each built app image to its current :main manifest digest. The
          # service KEY matches the ghcr() name arg, which is the Pulumi imageDigests
          # config key. Repo names follow www-<code>-<image> convention (www-jtp0.9.5).
          declare -A out=()
          for entry in www-cc-web:web www-cc-api:api www-cc-worker:worker www-cc-media-worker:media-worker www-cc-storybook:storybook www-cc-drizzle:drizzle www-cp-portal:captive-portal www-cc-map-provision:map-provision www-amp-app:amp-app www-tye-api:tye-api www-tye-web:tye-frontend; do
            repo="${entry%%:*}"
            name="${entry#*:}"
            d=$(docker buildx imagetools inspect "ghcr.io/0x63616c/$repo:main" --format '{{.Manifest.Digest}}' 2>/dev/null || true)
            if [ -n "$d" ]; then
              out[$name]="$d"
            fi
          done
          # Emit a compact JSON map (svc -> sha256:…) for the pulumi config step.
          json='{}'
          for k in "${!out[@]}"; do
            json=$(jq -cn --argjson cur "$json" --arg k "$k" --arg v "${out[$k]}" '$cur + {($k): $v}')
          done
          echo "Image digests: $json"
          echo "map=$json" >> "$GITHUB_OUTPUT"

      # Join the tailnet with an EPHEMERAL, tag-scoped key so the runner can reach
      # the homelab kube-apiserver. The node is auto-revoked when the job ends
      # (ephemeral: true + the action's post-step). No long-lived tailnet creds
      # live on the runner, only the single-use OAuth-minted key.
      - name: Connect to Tailscale (ephemeral)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: tag:ci
          # Ephemeral node so it's removed from the tailnet when the runner exits.
          args: --accept-routes

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install infra deps
        run: bun install --frozen-lockfile

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6

      # Write the kubeconfig the Pulumi k8s provider uses to reach the homelab
      # kube-apiserver over the tailnet (www-j934.9 produces this secret).
      # Contract:
      #   - server: https://homelab.tail8c014d.ts.net:26443 (a `tailscale serve`
      #     TCP forward to 127.0.0.1:26443 on homelab)
      #   - the kube API cert has NO tailnet SAN (SANs: k8s.orb.local, localhost),
      #     so the cluster entry sets `tls-server-name: k8s.orb.local` and embeds
      #     the OrbStack CA; auth is the OrbStack client cert/key.
      # All of that lives INSIDE the vault KUBECONFIG__B64, decoded from the env.
      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: pulumi up (deploy to k3s)
        working-directory: infra
        env:
          # PULUMI_ACCESS_TOKEN set by "Decrypt vault" step via GITHUB_ENV.
          # SOPS_AGE_KEY flows in here so loadVault() in program.ts can decrypt.
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
          # No KUBECONFIG override: kubectl and the Pulumi k8s provider both
          # default to $HOME/.kube/config, where the "Write kubeconfig" step put
          # it. (A `${{ env.HOME }}` expression evaluates to empty in the env
          # context, yielding /.kube/config -> "current-context is not set".)
          DIGEST_MAP: ${{ steps.digests.outputs.map }}
        run: |
          pulumi login
          pulumi stack select prod
          # Pin the k8s provider to the context the CI kubeconfig actually carries,
          # read from the file itself, so the provider never falls back to the
          # local `orbstack` context (which resolves per-machine to a DIFFERENT
          # cluster). The CI kubeconfig holds exactly one context (homelab over the
          # tailnet), so its current-context is unambiguous, no name agreed in
          # advance with www-j934.9 needed. If the blob ever ships WITHOUT a
          # current-context set, self-heal by selecting its sole context, so a
          # rebuilt secret that forgot `current-context:` can't strand the deploy
          # on "current-context is not set".
          ctx=$(kubectl config current-context 2>/dev/null || true)
          if [ -z "$ctx" ]; then
            ctx=$(kubectl config get-contexts -o name | head -n1)
            kubectl config use-context "$ctx" >/dev/null
          fi
          echo "Deploying with kube context: $ctx"
          pulumi config set wwwinfra:kubeContext "$ctx" --stack prod
          # Pin each changed app image by digest: a changed digest rolls only that
          # workload (www-czg). Clear the prior map first so a no-longer-built image
          # can't keep a phantom pin, then set each service's digest path.
          # The key MUST be namespaced `wwwinfra:imageDigests` to match the program's
          # `new Config("wwwinfra").getObject("imageDigests")`. A bare `--path
          # imageDigests.<svc>` writes under the PROJECT namespace (world-wide-webb:),
          # which the program never reads, so every image silently renders `:main`
          # (mutable tag) and pods NEVER roll to the freshly built build (www-j934.9).
          pulumi config rm wwwinfra:imageDigests --stack prod >/dev/null 2>&1 || true
          for svc in $(echo "$DIGEST_MAP" | jq -r 'keys[]'); do
            dig=$(echo "$DIGEST_MAP" | jq -r --arg s "$svc" '.[$s]')
            pulumi config set --path "wwwinfra:imageDigests.$svc" "$dig" --stack prod
          done
          pulumi up --yes --stack prod
