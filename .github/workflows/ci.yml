name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  # Manual trigger: rebuild + (on main) redeploy on demand. Useful for a forced
  # redeploy or to re-run after a transient infra failure. force_all=true
  # rebuilds every image and runs `pulumi up`; force_all=false falls back to the
  # path-filter diff (the www-bom8 deploy marker is retired, `pulumi up` converges
  # the declared stack on every green run, so no drift-tracking dispatch exists).
  workflow_dispatch:
    inputs:
      force_all:
        description: "Rebuild every image and redeploy (pulumi up); false = diff-only"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

# Cancellation behavior depends on the ref: cancel-in-progress is on for feature
# branches (killing superseded runs saves runner minutes) but off on main (where a
# newer push may already be deploying). On main at observed saturation (rho ~1.14),
# cancelling in-flight runs killed them before deploy and delayed commits waiting
# for others' later runs — lead time p50 was 2227s (37.1m) against a 777s (12.9m)
# pipeline. With cancellation off, GitHub keeps only the newest PENDING run per
# group and discards older pending ones, so intermediate pushes coalesce for free
# (zero compute) and the run that does start carries all of their commits. On
# feature branches, cancellation remains enabled; superseding is the right behavior
# there and nothing deploys from them (www-c0m).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  # Determine which apps actually changed so we only rebuild what's needed.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
      storybook: ${{ steps.filter.outputs.storybook }}
      drizzle: ${{ steps.filter.outputs.drizzle }}
      captiveportal: ${{ steps.filter.outputs.captiveportal }}
      mapprovision: ${{ steps.filter.outputs.mapprovision }}
      # infra-only changes (Pulumi program / specs) deploy without any image
      # rebuild: a `pulumi up` must still converge the declared stack.
      infra: ${{ steps.filter.outputs.infra }}
      any_app: ${{ steps.filter.outputs.any_app }}
    steps:
      - uses: actions/checkout@v4

      # No deploy-marker baseline (www-j934.14): `pulumi up` is
      # declarative-convergent, so the latest green run always reconciles the
      # whole declared stack to the committed digests, the `refs/deploy/main`
      # marker that kept Swarm's push-range model from stranding commits is
      # obsolete. dorny defaults to the push range on same-branch pushes and the
      # default-branch diff on feature branches, which is exactly what we want.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Shared changes (packages or root lockfile) force a rebuild of everything.
            # Control Center product-boundary changes rebuild the Control Center
            # images, but unrelated product folders do not.
            # NOTE: do NOT use '!negation' list items here. dorny/paths-filter OR-matches
            # each list entry, and a '!foo/**' pattern matches every file that ISN'T under
            # foo, so '!products/control-center/web/.storybook/**' matched docs/api/everything and made web
            # rebuild on every push (it broke ac_ci_selective: docs-only built web). The
            # web image build already ignores .storybook, so a positive-only list is both
            # correct and conservative; a rare .storybook-only edit harmlessly rebuilds web.
            web:
              - 'products/control-center/web/**'
              - 'products/control-center/**'
              - 'packages/**'
              - 'bun.lock'
            api:
              - 'products/control-center/api/**'
              - 'products/control-center/**'
              - 'packages/**'
              - 'bun.lock'
            # The worker bundles its domain cycles from @control-center/api, so an products/control-center/api
            # change must rebuild the worker image too (www-xjba).
            worker:
              - 'products/control-center/worker/**'
              - 'products/control-center/api/**'
              - 'products/control-center/**'
              - 'packages/**'
              - 'bun.lock'
            storybook:
              - 'products/control-center/web/.storybook/**'
              - 'products/control-center/web/src/**'
              - 'products/control-center/web/package.json'
              - 'products/control-center/**'
              # Serving config: a change to how nginx serves the bundle (cache
              # headers, asset 404 vs index.html fallback) must rebuild the image
              # too, or the fix never ships (www-w4aa).
              - 'products/control-center/web/nginx-storybook.conf'
              - 'products/control-center/web/Dockerfile.storybook'
              # The storybook image also bundles the captive-portal Storybook (the
              # composed /captive-portal ref), so a portal change must rebuild it
              # (www-q002.2/.5).
              - 'products/captive-portal/**'
              - 'packages/**'
              - 'bun.lock'
            # infra-only changes (the Pulumi program + workload specs) deploy
            # with NO image rebuild: the deploy job runs `pulumi up`, which must
            # converge an infra-only diff (e.g. a resource cap or env change).
            infra:
              - 'infra/**'
            # Drizzle Gateway wrapper image, a thin self-contained Dockerfile +
            # preload. It pins an upstream base and copies only products/control-center/drizzle, so it
            # rebuilds solely on its own changes (no packages/ or bun.lock dep).
            drizzle:
              - 'products/control-center/drizzle/**'
              - 'products/control-center/**'
            # Captive portal: a static nginx image built solely from its own product tree
            # (the build pulls workspace deps, so the root lockfile counts too). It
            # does NOT bundle @control-center/api, it talks to the api only over HTTP via the
            # scoped nginx proxy, so an products/control-center/api change does not rebuild it
            # (www-q002.2). Its nginx.conf + Dockerfile are part of the image.
            captiveportal:
              - 'products/captive-portal/**'
              - 'bun.lock'
            # Basemap provisioner (www-hn1i): a self-contained alpine + pmtiles
            # CLI + sh image, no workspace deps, so it rebuilds solely on its
            # own tree (mirrors drizzle).
            mapprovision:
              - 'products/control-center/map-provision/**'
              - 'products/control-center/**'
            # any_app is true when at least one image needs to be built. An
            # infra-only change is handled by the separate `infra` filter above,
            # the deploy job fires on `any_app || infra`.
            any_app:
              - 'products/control-center/**'
              - 'packages/**'
              - 'products/captive-portal/**'
              - 'bun.lock'

  # Test gate: typecheck + full vitest suite. Runs on every push (the repo
  # previously built and DEPLOYED without ever running tests). Deploy depends
  # on this passing.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Lint (biome)
        # Lint gate in CI, not just the lefthook pre-commit hook: a --no-verify
        # bypass (or a hook that isn't installed on a contributor's machine)
        # would otherwise ship lint regressions undetected (www-355t.6).
        run: bun run lint
      - name: Storybook docs guard
        # Authoritative backstop for the lefthook pre-commit `storybook-docs`
        # hook (bypassable with --no-verify): fails the test job if any tracked
        # *.stories.tsx lacks an autodocs Docs page. `deploy` needs `test`, so a
        # missing doc blocks the deploy. Fast (grep), runs before the slow
        # Playwright install so it fails early (www-o0ko).
        run: bash scripts/check-storybook-docs.sh
      - name: OrbStack watchdog logic tests
        # Hermetic self-test of the docker-hang watchdog's decide/probe logic
        # (www-sizh), no real docker/OrbStack. Gates the recovery automation so a
        # regression in its thresholds/anti-loop guard can't ship silently. Fast
        # (bash), runs before the slow Playwright install. Mirrors the
        # test-kiosk-health gate in ios-build.yml.
        run: bash scripts/test-orbstack-watchdog.sh
      - name: Basemap provisioner tests
        # Hermetic self-test of the map-provision script (www-hn1i): runtime
        # build resolution (no date pin to rot), if-missing/force modes, the
        # newest→previous fallback, atomic rename, and the nginx /maps/ loud-404.
        # Stubbed curl/pmtiles, no network. Fast (bash), runs before the slow
        # Playwright install. Mirrors the orbstack-watchdog gate above.
        run: bash scripts/test-map-provision.sh
      - name: Product CI wiring guards
        run: |
          bun run test:dockerfile-manifests
          bun run test:product-workspaces
          bun run test:control-center-ci-split
          bun run check:control-center-product-boundary
          bun run test:product-ci-isolation
          bun run test:tilt-product-lanes
          bun run test:product-doc-paths
      - name: Captive-portal LAN-edge proxy topology tests
        # Hermetic self-test of the portal-lan TLS-on-:42069 + http->https
        # redirect topology (www-q002.22), no real docker. Pins that the LAN edge
        # terminates portal TLS on the neutral host port (NOT :443/:8443, both
        # OrbStack-reserved) and bounces plain :80 to https on it, so a guest
        # never lands on plaintext. Fast (bash), runs before the slow Playwright
        # install. Mirrors the orbstack-watchdog gate above.
        run: bash scripts/test-portal-lan.sh
      - name: Control Center cutover tooling tests
        # Hermetic self-tests of the M7 production-cutover tooling (www-jtp0.7):
        # the red-first preflight gate (refuses cutover until rehearsal/snapshot/
        # counts/rollback/approval present), the post-cutover smoke dry-run plan,
        # the CNPG local-name cleanup guard, and the wall-panel health classifier
        # (1366x1024 + CF-error/skeleton markers, mirrored from iOS KioskHealth).
        # No cluster/DB/network/secrets. Fast, runs before the slow Playwright
        # install. Mirrors the gates above.
        run: |
          bash scripts/test-cc-cutover-preflight.sh
          bash scripts/test-cc-post-cutover-smoke.sh
          bash scripts/test-cnpg-local-name-preflight.sh
          node scripts/test-panel-health.mjs
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-
      - name: Install Playwright Chromium (for Storybook browser tests)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium
      - name: Install Playwright system deps (cached binary)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium
      - name: Test (unit jsdom + Storybook chromium)
        run: bun run test:coverage

  # Typecheck + dead-code run in parallel with the coverage suite so type
  # errors and knip regressions surface without waiting for Playwright to
  # install and all tests to run. Build jobs and deploy depend on both
  # `test` and `typecheck` passing (www-q2p5).
  typecheck:
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Dead code (knip, zero-tolerance)
        # Authoritative backstop for the lefthook pre-push guard (which a
        # --no-verify bypass or an uninstalled hook can skip). Export-level checks
        # are disabled in the shared script because Temporal registers runtime
        # activity/workflow exports dynamically by name.
        # `deploy` needs `typecheck`, so a regression blocks the prod deploy (www-k6p1).
        run: bun run knip

  # Build jobs depend on `changes` ONLY, not on test/typecheck. They run
  # concurrently with the test suite instead of queueing behind it (measured
  # 180s off the critical path, because the build fan-in is shorter than the
  # test job and now hides entirely under it).
  # This does NOT weaken the deploy gate: `deploy` still lists test + typecheck
  # in its own `needs:`, so an image built for a commit that fails tests is
  # simply never deployed. The only cost is building images for the ~9% of
  # pushes that fail — they are content-addressed and otherwise inert.
  build-web:
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    environment: prod
    steps:
      - uses: actions/checkout@v4

      # The Docker builder image has no .git, so the commit timestamp must be
      # computed here (where the repo is checked out) and passed in as a build-arg.
      # Unix-ms = author commit time × 1000; the badge renders "time since commit"
      # from it. Without this, vite emits "NaN" and the prod badge omits the age.
      - name: Resolve commit timestamp (unix-ms)
        run: echo "BUILD_TIME=$(( $(git show -s --format=%ct HEAD) * 1000 ))" >> "$GITHUB_ENV"

      - name: Build and push web image
        uses: ./.github/actions/build-product-image
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        with:
          image: www-control-center-web
          dockerfile: products/control-center/web/Dockerfile
          cache-scope: web
          build-args: |
            BUILD_HASH=${{ github.sha }}
            BUILD_TIME=${{ env.BUILD_TIME }}

  build-api:
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Build and push api image
        uses: ./.github/actions/build-product-image
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        with:
          image: www-control-center-api
          dockerfile: products/control-center/api/Dockerfile
          cache-scope: api
          build-args: |
            BUILD_HASH=${{ github.sha }}

  build-worker:
    needs: [changes]
    if: needs.changes.outputs.worker == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Build and push worker image
        uses: ./.github/actions/build-product-image
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        with:
          image: www-control-center-worker
          dockerfile: products/control-center/worker/Dockerfile
          cache-scope: worker

  build-storybook:
    needs: [changes]
    if: needs.changes.outputs.storybook == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Build and push storybook image
        uses: ./.github/actions/build-product-image
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        with:
          image: www-control-center-storybook
          dockerfile: products/control-center/web/Dockerfile.storybook
          cache-scope: storybook

  build-drizzle:
    needs: [changes]
    if: needs.changes.outputs.drizzle == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Build and push drizzle image
        uses: ./.github/actions/build-product-image
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        with:
          image: www-control-center-drizzle
          dockerfile: products/control-center/drizzle/Dockerfile
          cache-scope: drizzle

  build-captive-portal:
    needs: [changes]
    if: needs.changes.outputs.captiveportal == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Build and push captive-portal image
        uses: ./.github/actions/build-product-image
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        with:
          image: www-captive-portal-portal
          dockerfile: products/captive-portal/apps/frontend/Dockerfile
          cache-scope: captive-portal

  build-captive-portal-api:
    needs: [changes]
    if: needs.changes.outputs.captiveportal == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Build and push captive-portal-api image
        uses: ./.github/actions/build-product-image
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        with:
          image: www-captive-portal-api
          dockerfile: products/captive-portal/Dockerfile.api
          cache-scope: captive-portal-api

  build-map-provision:
    needs: [changes]
    if: needs.changes.outputs.mapprovision == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Build and push map-provision image
        uses: ./.github/actions/build-product-image
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        with:
          image: www-control-center-map-provision
          dockerfile: products/control-center/map-provision/Dockerfile
          cache-scope: map-provision

  # After the images build on main, deploy to the homelab k3s cluster with
  # `pulumi up` (www-j934.14). The runner joins the tailnet with an EPHEMERAL
  # Tailscale key (auto-revoked when the job ends), reaches the kube-apiserver
  # over the tailnet, and runs the Pulumi program in infra/. CI is the deployer.
  #
  # Fires on `any_app || infra`: an image change OR an infra-only change (a spec
  # tweak with no rebuild) must both converge the declared stack. `pulumi up` is
  # declarative-convergent, so the latest green run always reconciles prod to the
  # committed digests, no deploy marker needed (www-bom8 retired).
  deploy:
    needs: [changes, test, typecheck, build-web, build-api, build-worker, build-storybook, build-drizzle, build-captive-portal, build-captive-portal-api, build-map-provision]
    # always() lets us run even when some build jobs were skipped (no changes).
    # We proceed when: on main, an app OR infra changed, and no build failed.
    if: |
      always() &&
      github.ref_name == 'main' &&
      (needs.changes.outputs.any_app == 'true' || needs.changes.outputs.infra == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all)) &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Protected environment: AGE_PRIVATE_KEY is scoped to this env so it never
    # appears on PR runners (CC-k8t7 age-key = skeleton key for all 114 secrets).
    environment: prod
    steps:
      - uses: actions/checkout@v4

      # Decrypt vault, the ONLY step that touches AGE_PRIVATE_KEY. Installs sops
      # + age, decrypts secrets/vault.yaml, and masks each value before exporting.
      # No set -x around this block. Values flow into subsequent steps via GITHUB_ENV.
      - name: Decrypt vault (SOPS+age)
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        run: |
          # Install sops
          curl -fsSL https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64 \
            -o /usr/local/bin/sops && chmod +x /usr/local/bin/sops
          # Install age
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-amd64.tar.gz \
            | tar -xzC /usr/local/bin --strip-components=1 age/age age/age-keygen

          extract() { sops -d secrets/vault.yaml | grep "^$1:" | cut -d' ' -f2-; }

          TS_CLIENT_ID=$(extract TAILSCALE_OAUTH_CLIENT__CLIENT_ID)
          TS_CLIENT_SECRET=$(extract TAILSCALE_OAUTH_CLIENT__CLIENT_SECRET)
          PULUMI_TOKEN=$(extract PULUMI__ACCESS_TOKEN)
          KUBECONFIG_B64_VAL=$(extract KUBECONFIG__B64)

          GHCR_PAT_VAL=$(extract GITHUB_PERSONAL_ACCESS_TOKEN__TOKEN)
          NTFY_TOPIC_VAL=$(extract NTFY_TOPIC)

          echo "::add-mask::$TS_CLIENT_ID"
          echo "::add-mask::$TS_CLIENT_SECRET"
          echo "::add-mask::$PULUMI_TOKEN"
          echo "::add-mask::$KUBECONFIG_B64_VAL"
          echo "::add-mask::$GHCR_PAT_VAL"
          echo "::add-mask::$NTFY_TOPIC_VAL"

          echo "TS_OAUTH_CLIENT_ID=$TS_CLIENT_ID" >> "$GITHUB_ENV"
          echo "TS_OAUTH_SECRET=$TS_CLIENT_SECRET" >> "$GITHUB_ENV"
          echo "PULUMI_ACCESS_TOKEN=$PULUMI_TOKEN" >> "$GITHUB_ENV"
          echo "KUBECONFIG_B64=$KUBECONFIG_B64_VAL" >> "$GITHUB_ENV"
          echo "GHCR_PAT=$GHCR_PAT_VAL" >> "$GITHUB_ENV"
          echo "NTFY_TOPIC=$NTFY_TOPIC_VAL" >> "$GITHUB_ENV"
          # SOPS_AGE_KEY flows into the pulumi up step via secrets.AGE_PRIVATE_KEY

      # Heads-up ping the moment the deploy actually begins (vault decrypted,
      # about to pin digests and run pulumi). min priority: no sound, just a
      # line in the ntfy list. Never fails the job.
      - name: Notify deploy start
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -n "$NTFY_TOPIC" ] || { echo "NTFY_TOPIC not set; skipping."; exit 0; }
          curl -fsS --max-time 10 \
            -H "Title: Deploy started" \
            -H "Priority: min" \
            -H "Tags: hourglass_flowing_sand" \
            -H "Click: $RUN_URL" \
            -d "$(git log -1 --pretty=%s) ($(git rev-parse --short HEAD))" \
            "https://ntfy.sh/$NTFY_TOPIC" || true

      # Read each app image's current :main digest. A pinned digest renders the
      # workload's image as @sha256:… in the Pulumi program (infra/src/services.ts
      # ghcr()), so `pulumi up` rolls ONLY the workloads whose digest changed,
      # the www-czg digest-pin guarantee, now config-driven via the Pulumi
      # program rather than an external webhook.
      - name: Log in to ghcr.io (read manifests)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GHCR_PAT }}

      - name: Collect image digests
        id: digests
        run: |
          # Map each built app image to its current :main manifest digest. The
          # KEY is product-component scoped and matches the Pulumi imageDigests
          # config key, while repo names use full product slugs.
          declare -A out=()
          for entry in www-control-center-web:control-center-web www-control-center-api:control-center-api www-control-center-worker:control-center-worker www-control-center-storybook:control-center-storybook www-control-center-drizzle:control-center-drizzle www-captive-portal-portal:captive-portal-portal www-captive-portal-api:captive-portal-api www-control-center-map-provision:control-center-map-provision; do
            repo="${entry%%:*}"
            name="${entry#*:}"
            d=$(docker buildx imagetools inspect "ghcr.io/0x63616c/$repo:main" --format '{{.Manifest.Digest}}' 2>/dev/null || true)
            if [ -n "$d" ]; then
              out[$name]="$d"
            fi
          done
          # Emit a compact JSON map (svc -> sha256:…) for the pulumi config step.
          json='{}'
          for k in "${!out[@]}"; do
            json=$(jq -cn --argjson cur "$json" --arg k "$k" --arg v "${out[$k]}" '$cur + {($k): $v}')
          done
          echo "Image digests: $json"
          echo "map=$json" >> "$GITHUB_OUTPUT"

      # Join the tailnet with an EPHEMERAL, tag-scoped key so the runner can reach
      # the homelab kube-apiserver. The node is auto-revoked when the job ends
      # (ephemeral: true + the action's post-step). No long-lived tailnet creds
      # live on the runner, only the single-use OAuth-minted key.
      - name: Connect to Tailscale (ephemeral)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: tag:ci
          # Ephemeral node so it's removed from the tailnet when the runner exits.
          args: --accept-routes

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install infra deps
        run: bun install --frozen-lockfile

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6

      # Write the kubeconfig the Pulumi k8s provider uses to reach the homelab
      # kube-apiserver over the tailnet (www-j934.9 produces this secret).
      # Contract:
      #   - server: https://homelab.tail8c014d.ts.net:26443 (a `tailscale serve`
      #     TCP forward to 127.0.0.1:26443 on homelab)
      #   - the kube API cert has NO tailnet SAN (SANs: k8s.orb.local, localhost),
      #     so the cluster entry sets `tls-server-name: k8s.orb.local` and embeds
      #     the OrbStack CA; auth is the OrbStack client cert/key.
      # All of that lives INSIDE the vault KUBECONFIG__B64, decoded from the env.
      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: pulumi up (deploy to k3s)
        working-directory: infra
        env:
          # PULUMI_ACCESS_TOKEN set by "Decrypt vault" step via GITHUB_ENV.
          # SOPS_AGE_KEY flows in here so loadVault() in program.ts can decrypt.
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
          # No KUBECONFIG override: kubectl and the Pulumi k8s provider both
          # default to $HOME/.kube/config, where the "Write kubeconfig" step put
          # it. (A `${{ env.HOME }}` expression evaluates to empty in the env
          # context, yielding /.kube/config -> "current-context is not set".)
          DIGEST_MAP: ${{ steps.digests.outputs.map }}
        run: |
          pulumi login
          pulumi stack select prod
          # Pin the k8s provider to the context the CI kubeconfig actually carries,
          # read from the file itself, so the provider never falls back to the
          # local `orbstack` context (which resolves per-machine to a DIFFERENT
          # cluster). The CI kubeconfig holds exactly one context (homelab over the
          # tailnet), so its current-context is unambiguous, no name agreed in
          # advance with www-j934.9 needed. If the blob ever ships WITHOUT a
          # current-context set, self-heal by selecting its sole context, so a
          # rebuilt secret that forgot `current-context:` can't strand the deploy
          # on "current-context is not set".
          ctx=$(kubectl config current-context 2>/dev/null || true)
          if [ -z "$ctx" ]; then
            ctx=$(kubectl config get-contexts -o name | head -n1)
            kubectl config use-context "$ctx" >/dev/null
          fi
          echo "Deploying with kube context: $ctx"
          pulumi config set wwwinfra:kubeContext "$ctx" --stack prod
          # Pin each changed app image by digest: a changed digest rolls only that
          # workload (www-czg). Clear the prior map first so a no-longer-built image
          # can't keep a phantom pin, then set each service's digest path.
          # The key MUST be namespaced `wwwinfra:imageDigests` to match the program's
          # `new Config("wwwinfra").getObject("imageDigests")`. A bare `--path
          # imageDigests.<svc>` writes under the PROJECT namespace (world-wide-webb:),
          # which the program never reads, so every image silently renders `:main`
          # (mutable tag) and pods NEVER roll to the freshly built build (www-j934.9).
          pulumi config rm wwwinfra:imageDigests --stack prod >/dev/null 2>&1 || true
          for svc in $(echo "$DIGEST_MAP" | jq -r 'keys[]'); do
            dig=$(echo "$DIGEST_MAP" | jq -r --arg s "$svc" '.[$s]')
            pulumi config set --path "wwwinfra:imageDigests.$svc" "$dig" --stack prod
          done
          pulumi up --yes --stack prod

  # Push a phone ping via ntfy.sh when main CI fails, and a quiet "deployed"
  # ping when the deploy job succeeds. Terminal job: never fails the pipeline
  # (curl errors are swallowed), never runs off main. The topic name lives in
  # the SOPS vault (NTFY_TOPIC), so this job needs the prod environment for
  # AGE_PRIVATE_KEY, same as deploy. Docs-only pushes (deploy skipped, nothing
  # failed) send nothing.
  notify:
    needs: [changes, test, typecheck, build-web, build-api, build-worker, build-storybook, build-drizzle, build-captive-portal, build-captive-portal-api, build-map-provision, deploy]
    if: always() && github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Send ntfy notification
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
          ANY_FAILED: ${{ contains(needs.*.result, 'failure') }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "$ANY_FAILED" != "true" ] && [ "$DEPLOY_RESULT" != "success" ]; then
            echo "Nothing to notify (no failure, no deploy)."
            exit 0
          fi

          # Install sops + age to read NTFY_TOPIC from the vault.
          curl -fsSL https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64 \
            -o /usr/local/bin/sops && chmod +x /usr/local/bin/sops
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-amd64.tar.gz \
            | tar -xzC /usr/local/bin --strip-components=1 age/age age/age-keygen

          TOPIC=$(sops -d secrets/vault.yaml | grep '^NTFY_TOPIC:' | cut -d' ' -f2-)
          echo "::add-mask::$TOPIC"
          if [ -z "$TOPIC" ]; then
            echo "NTFY_TOPIC not set in vault; skipping."
            exit 0
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          SUBJECT=$(git log -1 --pretty=%s)

          if [ "$ANY_FAILED" = "true" ]; then
            curl -fsS --max-time 10 \
              -H "Title: CI failed on main" \
              -H "Priority: high" \
              -H "Tags: rotating_light" \
              -H "Click: $RUN_URL" \
              -d "$SUBJECT ($SHORT_SHA)" \
              "https://ntfy.sh/$TOPIC" || true
          else
            curl -fsS --max-time 10 \
              -H "Title: Deployed" \
              -H "Priority: low" \
              -H "Tags: rocket" \
              -H "Click: $RUN_URL" \
              -d "$SUBJECT ($SHORT_SHA)" \
              "https://ntfy.sh/$TOPIC" || true
          fi
