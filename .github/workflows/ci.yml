name: CI

on:
  push:
    branches: ["**"]
  # Manual trigger: rebuild + (on main) redeploy all images on demand. Useful
  # for a forced redeploy or to re-run after a transient infra failure.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Stop a superseded push from running builds in parallel: a newer push to the
# same ref cancels the in-progress run instantly instead of letting both burn
# runner minutes. Combined with per-job timeout-minutes below, this caps the
# Actions-minute blast radius of rapid pushes and hung builds (www-c0m).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Determine which apps actually changed so we only rebuild what's needed.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
      mediaworker: ${{ steps.filter.outputs.mediaworker }}
      storybook: ${{ steps.filter.outputs.storybook }}
      bosun: ${{ steps.filter.outputs.bosun }}
      drizzle: ${{ steps.filter.outputs.drizzle }}
      captiveportal: ${{ steps.filter.outputs.captiveportal }}
      any_app: ${{ steps.filter.outputs.any_app }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Shared changes (packages or root lockfile) force a rebuild of everything.
            # NOTE: do NOT use '!negation' list items here. dorny/paths-filter OR-matches
            # each list entry, and a '!foo/**' pattern matches every file that ISN'T under
            # foo — so '!apps/web/.storybook/**' matched docs/api/everything and made web
            # rebuild on every push (it broke ac_ci_selective: docs-only built web). The
            # web image build already ignores .storybook, so a positive-only list is both
            # correct and conservative; a rare .storybook-only edit harmlessly rebuilds web.
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'bun.lock'
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'bun.lock'
            # The worker bundles its domain cycles from @repo/api, so an apps/api
            # change must rebuild the worker image too (www-xjba).
            worker:
              - 'apps/worker/**'
              - 'apps/api/**'
              - 'packages/**'
              - 'bun.lock'
            # media-worker bundles its domain code from @repo/api, so an apps/api
            # change must rebuild it too (same rule as worker — www-kp4k).
            mediaworker:
              - 'apps/media-worker/**'
              - 'apps/api/**'
              - 'packages/**'
              - 'bun.lock'
            storybook:
              - 'apps/web/.storybook/**'
              - 'apps/web/src/**'
              - 'apps/web/package.json'
              # Serving config: a change to how nginx serves the bundle (cache
              # headers, asset 404 vs index.html fallback) must rebuild the image
              # too, or the fix never ships (www-w4aa).
              - 'apps/web/nginx-storybook.conf'
              - 'apps/web/Dockerfile.storybook'
              # The storybook image also bundles the captive-portal Storybook (the
              # composed /captive-portal ref), so a portal change must rebuild it
              # (www-q002.2/.5).
              - 'apps/captive-portal/**'
              - 'packages/**'
              - 'bun.lock'
            # bosun-agent image bakes in the bosun source + deploy.config + infra,
            # so any of those (or its Dockerfile) must trigger a rebuild.
            bosun:
              - 'packages/bosun/**'
              - 'deploy.config.ts'
              - 'infra/**'
              - 'bun.lock'
            # Drizzle Gateway wrapper image — a thin self-contained Dockerfile +
            # preload. It pins an upstream base and copies only apps/drizzle, so it
            # rebuilds solely on its own changes (no packages/ or bun.lock dep).
            drizzle:
              - 'apps/drizzle/**'
            # Captive portal: a static nginx image built solely from its own tree
            # (the build pulls workspace deps, so the root lockfile counts too). It
            # does NOT bundle @repo/api — it talks to the api only over HTTP via the
            # scoped nginx proxy — so an apps/api change does not rebuild it
            # (www-q002.2). Its nginx.conf + Dockerfile are part of the image.
            captiveportal:
              - 'apps/captive-portal/**'
              - 'bun.lock'
            # any_app is true when at least one image needs to be built. Includes
            # deploy.config.ts so a config-only change still triggers a deploy.
            any_app:
              - 'apps/**'
              - 'packages/**'
              - 'deploy.config.ts'
              - 'infra/**'
              - 'bun.lock'

  # Test gate: typecheck + full vitest suite with coverage. Runs on every push
  # (the repo previously built and DEPLOYED without ever running tests). Deploy
  # depends on this passing. Also refreshes the self-hosted coverage/LOC badge
  # JSON and commits it back on main so the README badges stay real (www-afz).
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    # The coverage run (scripts/coverage.sh) OOM-kills the test job, blocking the
    # deploy that depends on it (www-dasj). It's NOT worker fan-out (maxWorkers=2)
    # and NOT a leak: apps/web is pinned to a SINGLE fork that accumulates jsdom +
    # React module state + v8-coverage data across the whole web suite, and that
    # suite grew past the heap (4GB default, then 6GB) — bounded-large, not
    # unbounded. `bun run test` passes locally because it uses 8GB heap AND no
    # coverage; CI adds v8 instrumentation on top with less heap. ubuntu-latest
    # has 16GB RAM and only the one web fork is large (sibling project forks are
    # tiny), so a 12GB heap for that process is safe headroom. Durable fix —
    # reduce per-fork accumulation (recycle the fork / split the web suite) — is
    # tracked on www-dasj; this stops chasing the heap every time the suite grows.
    env:
      NODE_OPTIONS: --max-old-space-size=12288
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the badge commit can rebase cleanly onto main.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Lint (biome)
        # Lint gate in CI, not just the lefthook pre-commit hook: a --no-verify
        # bypass (or a hook that isn't installed on a contributor's machine)
        # would otherwise ship lint regressions undetected (www-355t.6).
        run: bunx biome check .
      - name: Storybook docs guard
        # Authoritative backstop for the lefthook pre-commit `storybook-docs`
        # hook (bypassable with --no-verify): fails the test job if any tracked
        # *.stories.tsx lacks an autodocs Docs page. `deploy` needs `test`, so a
        # missing doc blocks the deploy. Fast (grep) — runs before the slow
        # Playwright install so it fails early (www-o0ko).
        run: bash scripts/check-storybook-docs.sh
      - name: OrbStack watchdog logic tests
        # Hermetic self-test of the docker-hang watchdog's decide/probe logic
        # (www-sizh) — no real docker/OrbStack. Gates the recovery automation so a
        # regression in its thresholds/anti-loop guard can't ship silently. Fast
        # (bash), runs before the slow Playwright install. Mirrors the
        # test-kiosk-health gate in ios-build.yml.
        run: bash scripts/test-orbstack-watchdog.sh
      - name: Install Playwright Chromium (for Storybook browser tests)
        run: bunx playwright install --with-deps chromium
      - name: Typecheck
        run: bun run typecheck
      - name: Dead code (knip, zero-tolerance)
        # Authoritative backstop for the lefthook pre-push guard (which a
        # --no-verify bypass or an uninstalled hook can skip). knip exits non-zero
        # on ANY unused file/export/dep — the repo is held at zero dead code.
        # `deploy` needs `test`, so a regression blocks the prod deploy (www-k6p1).
        run: bunx knip
      - name: Test with coverage (unit jsdom + Storybook chromium, merged)
        run: bun run test:coverage
      - name: Regenerate badge JSON
        run: bun run badges
      - name: Commit refreshed badges (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          # Only commit when a badge actually changed. --no-verify skips the
          # local lefthook hooks (gitleaks etc. aren't installed on the runner);
          # [skip ci] stops this cosmetic commit from re-triggering the workflow.
          # All steps are best-effort so a push race never fails the test gate.
          if ! git diff --quiet -- .github/badges; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/badges
            git commit --no-verify -m "chore(ci/www-afz): refresh coverage + loc badges [skip ci]" || true
            git pull --rebase --autostash origin main || true
            git push || true
          fi

  build-web:
    needs: [changes, test]
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Native arm64 runner (ubuntu-24.04-arm) — no QEMU emulation. The deploy
      # target (homelab Mac Mini under OrbStack) is arm64 and nothing in prod
      # runs amd64, so images are built linux/arm64 only. Dropping the emulated
      # amd64 leg removed the 5-10x QEMU slowdown that dominated build time (www-4yt).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # The Docker builder image has no .git, so the commit timestamp must be
      # computed here (where the repo is checked out) and passed in as a build-arg.
      # Unix-ms = author commit time × 1000; the badge renders "time since commit"
      # from it. Without this, vite emits "NaN" and the prod badge omits the age.
      - name: Resolve commit timestamp (unix-ms)
        run: echo "BUILD_TIME=$(( $(git show -s --format=%ct HEAD) * 1000 ))" >> "$GITHUB_ENV"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            BUILD_HASH=${{ github.sha }}
            BUILD_TIME=${{ env.BUILD_TIME }}
          tags: |
            ghcr.io/0x63616c/control-center-web:${{ github.sha }}
            ghcr.io/0x63616c/control-center-web:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-api:
    needs: [changes, test]
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Native arm64 runner (ubuntu-24.04-arm) — no QEMU emulation. The deploy
      # target (homelab Mac Mini under OrbStack) is arm64 and nothing in prod
      # runs amd64, so images are built linux/arm64 only. Dropping the emulated
      # amd64 leg removed the 5-10x QEMU slowdown that dominated build time (www-4yt).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/control-center-api:${{ github.sha }}
            ghcr.io/0x63616c/control-center-api:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-worker:
    needs: [changes, test]
    if: needs.changes.outputs.worker == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Native arm64 runner (ubuntu-24.04-arm) — no QEMU emulation. The deploy
      # target (homelab Mac Mini under OrbStack) is arm64 and nothing in prod
      # runs amd64, so images are built linux/arm64 only.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/control-center-worker:${{ github.sha }}
            ghcr.io/0x63616c/control-center-worker:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  build-media-worker:
    needs: [changes, test]
    if: needs.changes.outputs.mediaworker == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push media-worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/media-worker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/control-center-media-worker:${{ github.sha }}
            ghcr.io/0x63616c/control-center-media-worker:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=media-worker
          cache-to: type=gha,mode=max,scope=media-worker

  build-storybook:
    needs: [changes, test]
    if: needs.changes.outputs.storybook == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Native arm64 runner (ubuntu-24.04-arm) — no QEMU emulation. The deploy
      # target (homelab Mac Mini under OrbStack) is arm64 and nothing in prod
      # runs amd64, so images are built linux/arm64 only. Dropping the emulated
      # amd64 leg removed the 5-10x QEMU slowdown that dominated build time (www-4yt).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push storybook image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.storybook
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/control-center-storybook:${{ github.sha }}
            ghcr.io/0x63616c/control-center-storybook:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=storybook
          cache-to: type=gha,mode=max,scope=storybook

  build-bosun:
    needs: [changes, test]
    if: needs.changes.outputs.bosun == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Native arm64 runner (ubuntu-24.04-arm) — no QEMU emulation. The deploy
      # target (homelab Mac Mini under OrbStack) is arm64 and nothing in prod
      # runs amd64, so images are built linux/arm64 only. Dropping the emulated
      # amd64 leg removed the 5-10x QEMU slowdown that dominated build time (www-4yt).
      - name: Set up Docker Buildx
