name: CI

on:
  push:
    branches: ["**"]

permissions:
  contents: read
  packages: write

# Stop a superseded push from running builds in parallel: a newer push to the
# same ref cancels the in-progress run instantly instead of letting both burn
# runner minutes. Combined with per-job timeout-minutes below, this caps the
# Actions-minute blast radius of rapid pushes and hung builds (www-c0m).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Determine which apps actually changed so we only rebuild what's needed.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      storybook: ${{ steps.filter.outputs.storybook }}
      bosun: ${{ steps.filter.outputs.bosun }}
      any_app: ${{ steps.filter.outputs.any_app }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Shared changes (packages or root lockfile) force a rebuild of everything.
            # NOTE: do NOT use '!negation' list items here. dorny/paths-filter OR-matches
            # each list entry, and a '!foo/**' pattern matches every file that ISN'T under
            # foo — so '!apps/web/.storybook/**' matched docs/api/everything and made web
            # rebuild on every push (it broke ac_ci_selective: docs-only built web). The
            # web image build already ignores .storybook, so a positive-only list is both
            # correct and conservative; a rare .storybook-only edit harmlessly rebuilds web.
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'bun.lock'
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'bun.lock'
            storybook:
              - 'apps/web/.storybook/**'
              - 'apps/web/src/**'
              - 'apps/web/package.json'
              - 'packages/**'
              - 'bun.lock'
            # bosun-agent image bakes in the bosun source + deploy.config + infra,
            # so any of those (or its Dockerfile) must trigger a rebuild.
            bosun:
              - 'packages/bosun/**'
              - 'deploy.config.ts'
              - 'infra/**'
              - 'bun.lock'
            # any_app is true when at least one image needs to be built. Includes
            # deploy.config.ts so a config-only change still triggers a deploy.
            any_app:
              - 'apps/**'
              - 'packages/**'
              - 'deploy.config.ts'
              - 'infra/**'
              - 'bun.lock'

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # QEMU enables emulated arm64 builds on the amd64 runner. The deploy
      # target (homelab Mac Mini under OrbStack) is arm64, so images MUST
      # include linux/arm64 or the swarm node rejects them ("no matching
      # manifest for linux/arm64/v8").
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/control-center-web:${{ github.sha }}
            ghcr.io/0x63616c/control-center-web:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # QEMU enables emulated arm64 builds on the amd64 runner. The deploy
      # target (homelab Mac Mini under OrbStack) is arm64, so images MUST
      # include linux/arm64 or the swarm node rejects them ("no matching
      # manifest for linux/arm64/v8").
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/control-center-api:${{ github.sha }}
            ghcr.io/0x63616c/control-center-api:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-storybook:
    needs: changes
    if: needs.changes.outputs.storybook == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # QEMU enables emulated arm64 builds on the amd64 runner. The deploy
      # target (homelab Mac Mini under OrbStack) is arm64, so images MUST
      # include linux/arm64 or the swarm node rejects them ("no matching
      # manifest for linux/arm64/v8").
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push storybook image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.storybook
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/control-center-storybook:${{ github.sha }}
            ghcr.io/0x63616c/control-center-storybook:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=storybook
          cache-to: type=gha,mode=max,scope=storybook

  build-bosun:
    needs: changes
    if: needs.changes.outputs.bosun == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # QEMU enables emulated arm64 builds on the amd64 runner. The deploy
      # target (homelab Mac Mini under OrbStack) is arm64, so images MUST
      # include linux/arm64 or the swarm node rejects them ("no matching
      # manifest for linux/arm64/v8").
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bosun-agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/bosun/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/control-center-bosun:${{ github.sha }}
            ghcr.io/0x63616c/control-center-bosun:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=bosun
          cache-to: type=gha,mode=max,scope=bosun

  # After any image build succeeds on main, trigger bosun deploy on the homelab.
  # The webhook receiver (bosun serve) runs on the box; the HMAC token is in a repo secret.
  # This job only runs when at least one image was built AND the branch is main.
  deploy:
    needs: [changes, build-web, build-api, build-storybook, build-bosun]
    # always() lets us run even when some build jobs were skipped (no changes).
    # We proceed when: on main, at least one app changed, and no build failed.
    if: |
      always() &&
      github.ref_name == 'main' &&
      needs.changes.outputs.any_app == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Read each image's current :main digest so the deploy pins by digest
      # (www-czg): a changed digest is a changed stack spec, so docker stack deploy
      # reliably rolls only the rebuilt services — no reliance on :main tag
      # re-resolution, which silently failed to roll the self-deploying agent.
      - name: Log in to ghcr.io (read manifests)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Collect image digests
        id: payload
        run: |
          images='{}'
          for name in control-center-web control-center-api control-center-storybook control-center-bosun; do
            d=$(docker buildx imagetools inspect "ghcr.io/0x63616c/$name:main" --format '{{.Manifest.Digest}}' 2>/dev/null || true)
            if [ -n "$d" ]; then
              images=$(jq -cn --argjson cur "$images" --arg n "$name" --arg d "$d" '$cur + {($n): $d}')
            fi
          done
          body=$(jq -cn --argjson imgs "$images" '{images: $imgs}')
          echo "Deploy payload: $body"
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Trigger bosun deploy webhook
        run: |
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.BOSUN_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '${{ steps.payload.outputs.body }}' \
            https://hooks.worldwidewebb.co/deploy/control-center
