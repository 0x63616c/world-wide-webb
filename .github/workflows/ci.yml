          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push drizzle image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/drizzle/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/control-center-drizzle:${{ github.sha }}
            ghcr.io/0x63616c/control-center-drizzle:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=drizzle
          cache-to: type=gha,mode=max,scope=drizzle

  build-captive-portal:
    needs: [changes, test]
    if: needs.changes.outputs.captiveportal == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Native arm64 runner (deploy target is the arm64 Mac Mini) — same as the
      # other image builds; no QEMU emulation (www-4yt).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push captive-portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/captive-portal/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/0x63616c/control-center-captive-portal:${{ github.sha }}
            ghcr.io/0x63616c/control-center-captive-portal:${{ github.ref_name == 'main' && 'main' || github.sha }}
          cache-from: type=gha,scope=captive-portal
          cache-to: type=gha,mode=max,scope=captive-portal

  # After any image build succeeds on main, trigger bosun deploy on the homelab.
  # The webhook receiver (bosun serve) runs on the box; the HMAC token is in a repo secret.
  # This job only runs when at least one image was built AND the branch is main.
  deploy:
    needs: [changes, test, build-web, build-api, build-worker, build-media-worker, build-storybook, build-bosun, build-drizzle, build-captive-portal]
    # always() lets us run even when some build jobs were skipped (no changes).
    # We proceed when: on main, at least one app changed, and no build failed.
    if: |
      always() &&
      github.ref_name == 'main' &&
      (needs.changes.outputs.any_app == 'true' || github.event_name == 'workflow_dispatch') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Read each image's current :main digest so the deploy pins by digest
      # (www-czg): a changed digest is a changed stack spec, so docker stack deploy
      # reliably rolls only the rebuilt services — no reliance on :main tag
      # re-resolution, which silently failed to roll the self-deploying agent.
      - name: Log in to ghcr.io (read manifests)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Collect image digests
        id: payload
        run: |
          images='{}'
          for name in control-center-web control-center-api control-center-worker control-center-media-worker control-center-storybook control-center-bosun control-center-drizzle control-center-captive-portal; do
            d=$(docker buildx imagetools inspect "ghcr.io/0x63616c/$name:main" --format '{{.Manifest.Digest}}' 2>/dev/null || true)
            if [ -n "$d" ]; then
              images=$(jq -cn --argjson cur "$images" --arg n "$name" --arg d "$d" '$cur + {($n): $d}')
            fi
          done
          body=$(jq -cn --argjson imgs "$images" '{images: $imgs}')
          echo "Deploy payload: $body"
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Trigger bosun deploy webhook
        run: |
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.BOSUN_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '${{ steps.payload.outputs.body }}' \
            https://hooks.worldwidewebb.co/deploy/control-center
