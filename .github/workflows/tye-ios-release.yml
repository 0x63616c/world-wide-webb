# Builds the Text Your Ex iOS Capacitor shell (products/text-your-ex/ios) and uploads to TestFlight.
# The web app is bundled at build time (Capacitor bundled mode, no server.url in capacitor.config.ts).
# VITE_API_BASE points at the live production API (https://api--tye.worldwidewebb.co).
#
# TYE is live in production (www-jtp0.6.10), so this workflow is active.
# Secrets from SOPS vault (CC-k8t7).

name: TYE iOS Release

on:
  push:
    branches: [main]
    paths:
      - "products/text-your-ex/ios/**"
      - "products/text-your-ex/capacitor.config.ts"
      - "products/text-your-ex/apps/frontend/**"
      - "products/text-your-ex/package.json"
      - ".github/workflows/tye-ios-release.yml"
  schedule:
    - cron: "0 14 1 * *" # 1st of every month, keeps the TestFlight build fresh (90-day expiry)
  workflow_dispatch:

concurrency:
  group: tye-ios-release
  cancel-in-progress: true

jobs:
  build:
    name: Build and upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 30
    # Protected environment: AGE_PRIVATE_KEY is gated here (CC-k8t7).
    environment: prod
    defaults:
      run:
        working-directory: products/text-your-ex
    env:
      VITE_API_BASE: https://api--tye.worldwidewebb.co
      # App identifiers the Fastfile requires (non-secret). bundle id is the
      # immutable tye App ID; team is the shared WWW Apple team.
      BUNDLE_ID: co.worldwidewebb.textyourex
      APPLE_TEAM_ID: X9E4HG27NK
      # Relative to the fastlane working dir (products/text-your-ex).
      IOS_PROJECT: ios/App/App.xcodeproj
      IOS_SCHEME: App
      INITIAL_BUILD_NUMBER: "0"
    steps:
      - uses: actions/checkout@v4

      # Decrypt vault — the only step touching AGE_PRIVATE_KEY. No set -x here.
      - name: Decrypt vault (SOPS+age)
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
        run: |
          brew install sops age 2>/dev/null || true

          extract() { sops -d "$GITHUB_WORKSPACE/secrets/vault.yaml" | grep "^$1:" | cut -d' ' -f2-; }

          MATCH_PWD=$(extract APP_STORE_CONNECT_API__MATCH_PASSWORD)
          GIT_AUTH=$(extract MATCH_GIT_BASIC_AUTHORIZATION)
          KEY_ID=$(extract APP_STORE_CONNECT_API__KEY_ID)
          ISSUER_ID=$(extract APP_STORE_CONNECT_API__ISSUER_ID)
          P8=$(extract APP_STORE_CONNECT_API__P8_CONTENT)

          echo "::add-mask::$MATCH_PWD"
          echo "::add-mask::$GIT_AUTH"
          echo "::add-mask::$KEY_ID"
          echo "::add-mask::$ISSUER_ID"
          echo "::add-mask::$P8"

          echo "MATCH_PASSWORD=$MATCH_PWD" >> "$GITHUB_ENV"
          echo "MATCH_GIT_BASIC_AUTHORIZATION=$GIT_AUTH" >> "$GITHUB_ENV"
          echo "ASC_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          echo "ASC_ISSUER_ID=$ISSUER_ID" >> "$GITHUB_ENV"
          echo "ASC_KEY_CONTENT=$P8" >> "$GITHUB_ENV"
          echo "MATCH_GIT_URL=https://github.com/0x63616c/certificates.git" >> "$GITHUB_ENV"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Patch apple-sign-in SPM for Capacitor 8
        # iOS-only: widen the plugin's capacitor-swift-pm pin so xcodebuild SPM
        # resolution doesn't conflict with the app's Capacitor 8. Kept out of root
        # bun patchedDependencies so it can't break the server/web Docker builds.
        run: node products/text-your-ex/scripts/patch-ios-spm.mjs
        working-directory: .

      - name: Build web (VITE_API_BASE baked in)
        run: bun run --cwd apps/frontend build
        env:
          VITE_API_BASE: ${{ env.VITE_API_BASE }}

      - name: Capacitor sync
        run: bunx cap sync ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: products/text-your-ex

      - name: Build and upload to TestFlight
        run: bundle exec fastlane release
        env:
          MATCH_PASSWORD: ${{ env.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ env.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_GIT_URL: ${{ env.MATCH_GIT_URL }}
          ASC_KEY_ID: ${{ env.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ env.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ env.ASC_KEY_CONTENT }}
