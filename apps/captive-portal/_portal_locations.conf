# Shared location block for the captive portal, included by both the :80 and :443
# servers (apps/captive-portal/nginx.conf). Keeping it in one file means the
# scoped-proxy SECURITY BOUNDARY is defined exactly once and can't drift between
# the two listeners.

# ── The ONLY proxied path: portal tRPC procedures. ───────────────────────────
# SECURITY (www-q002.20): tRPC httpBatchLink comma-joins procedure names IN THE
# PATH (e.g. /api/trpc/portal.sendCode,lights.list?batch=1). A naive prefix match
# on `portal.` would let a hand-crafted batch from a guest smuggle a dashboard
# procedure (lights/climate/Sonos) through, because the api executes EVERY proc in
# the batch. So this location matches ONLY when the WHOLE comma list is portal.*:
# a single portal proc OR an all-portal batch. nginx matches `location` against the
# DECODED, normalized path, so an encoded comma (%2C) is decoded to `,` before this
# regex runs and is evaluated here too. A request with ANY non-portal proc fails to
# match and falls through to `location /api/ { return 404; }` below.
location ~ "^/api/trpc/portal\.[^,/]*(?:,portal\.[^,/]*)*$" {
    # Defence in depth: reject a literal encoded comma in the RAW request URI. The
    # location regex already catches the decoded form, but this blocks any
    # double-encoding / non-normalizing edge before it can reach the api as a batch
    # separator. ($request_uri is the raw request line, incl. the query string.)
    if ($request_uri ~* "%2c") { return 404; }
    # /api/trpc/portal.sendCode -> /trpc/portal.sendCode (strip the /api namespace;
    # the api serves tRPC at /trpc). The capture keeps the full (possibly batched)
    # portal proc list.
    rewrite "^/api(/trpc/portal\..*)$" $1 break;
    # Proxy to the api Service by its in-cluster FQDN (www-q002.25). The api
    # Service ClusterIP is stable for the Service's lifetime in k8s and both
    # Services are created by the same Pulumi apply, so a literal upstream
    # resolved once at startup is correct and robust (a pod restart keeps the
    # same ClusterIP). This replaces the Swarm-era `set $portal_api api;` +
    # `resolver 127.0.0.11` (Docker embedded DNS, absent in a k8s pod) that the
    # k3s migration missed, which left the upstream as ":4201" (no host) -> 500.
    # NOTE: a `set $var` could not live here anyway, it would follow the
    # `rewrite ... break` above, which halts the rewrite phase before it runs.
    proxy_pass http://api.control-center.svc.cluster.local:4201;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Marker header so the api can enforce its OWN portal-only scope on the batch
    # (defence in depth, www-q002.20 layer B: backend rejects a non-portal proc when
    # this is present, so the boundary holds even if this proxy is bypassed).
    #
    # SECURITY: proxy_set_header REDEFINES the header, so any client-supplied
    # X-Portal-Scope (a guest trying to forge the marker to flip the api guard into
    # "trust me") is OVERWRITTEN here with our value before the request reaches the
    # api. A guest on the WLAN therefore cannot set this themselves. The api must
    # additionally only trust the marker on requests arriving over the internal
    # overlay (from this proxy), never a direct hit, so a forged header on a
    # direct-to-api connection is meaningless (backend enforces, www-q002.20 layer B).
    proxy_set_header X-Portal-Scope portal;
}

# ── Everything else under /api is the dashboard surface: 404, never proxy. This
# is the guest-VLAN boundary, a lights/climate/Sonos procedure hit through the
# portal host dead-ends here (www-q002.14 verifies the 404).
location /api/ {
    return 404;
}

# ── The SPA. try_files falls back to index.html so client-side routes (e.g. the
# Terms screen) survive a refresh / deep link.
location / {
    try_files $uri $uri/ /index.html;
}

# gzip stays OFF for the captive portal (www-q002.26). Apple's Captive Network
# Assistant (the auto-pop sheet) can fail to decompress a gzipped captive page and
# render nothing ("the webpage couldn't be loaded"). The portal payload is tiny,
# so compression buys almost nothing; keep it off so the CNA always gets plain
# bytes. (The portal is reached at the raw IP over HTTP, see docs/captive-portal/
# runbook.md, the CNA will not render the real-domain/HTTPS form; www-q002.28.)
gzip off;
