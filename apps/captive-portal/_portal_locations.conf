# Shared location block for the captive portal, included by both the :80 and :443
# servers (apps/captive-portal/nginx.conf). Keeping it in one file means the
# scoped-proxy SECURITY BOUNDARY is defined exactly once and can't drift between
# the two listeners.

# ── The ONLY proxied path: portal tRPC procedures. ───────────────────────────
# Matches /api/trpc/portal.<proc> (incl. tRPC batches, which always start with
# the first procedure name). The rewrite strips the portal's /api namespace so
# the api sees its real /trpc/portal.* endpoint.
location ~ ^/api/trpc/portal\. {
    # /api/trpc/portal.sendCode -> /trpc/portal.sendCode
    rewrite ^/api(/trpc/portal\..*)$ $1 break;
    # Variable upstream so the hostname is resolved per-request via `resolver`
    # (a literal proxy_pass host is resolved once at startup and hard-fails if
    # absent). $portal_api is a plain var, not a captured group.
    set $portal_api api;
    proxy_pass http://$portal_api:4201;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Everything else under /api is the dashboard surface: 404, never proxy. This
# is the guest-VLAN boundary — a lights/climate/Sonos procedure hit through the
# portal host dead-ends here (CC-q002.14 verifies the 404).
location /api/ {
    return 404;
}

# ── The SPA. try_files falls back to index.html so client-side routes (e.g. the
# Terms screen) survive a refresh / deep link.
location / {
    try_files $uri $uri/ /index.html;
}

# Standard gzip for assets.
gzip on;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;
