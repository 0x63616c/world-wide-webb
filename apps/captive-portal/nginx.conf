# Captive portal nginx: serves the static Vite SPA and scope-proxies ONLY the
# portal tRPC procedures to the dashboard api, over BOTH :80 and :443 (TLS).
#
# SECURITY BOUNDARY (CC-q002): guests on the open guest WLAN are untrusted. The
# ONLY path that reaches the api is /api/trpc/portal.*, every other /api path
# 404s, so a guest can never invoke a dashboard procedure (lights/climate/Sonos).
# The api itself serves tRPC at /trpc (apps/api/src/server.ts), so the portal's
# /api/trpc namespace is rewritten to /trpc when proxied; the /api prefix is the
# portal's own front-door namespace and never reaches the api.
#
# TLS (CC-q002.13/.14): the open guest WLAN makes HTTPS non-negotiable. :443
# terminates TLS from the shared portal-certs volume (a Let's Encrypt cert issued
# via Cloudflare DNS-01 by the portal-cert-renew cron job). The entrypoint
# (docker-entrypoint-portal.sh) writes a self-signed PLACEHOLDER to those paths on
# first boot when the volume is empty, so nginx, and the container healthcheck,
# come up green BEFORE the real cert lands; acme.sh then replaces it and the
# entrypoint's reload loop picks it up. :80 stays listening for the swarm
# healthcheck and the LAN/CI curl path (it is NOT redirected, so the healthcheck
# always gets a 200 even mid-cert-swap).

# Docker/Swarm embedded DNS for the api upstream, see _portal_locations.conf.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/_portal_locations.conf;
}

server {
    listen 443 ssl;
    server_name captive-portal.worldwidewebb.co;

    # Cert + key live on the shared portal-certs volume (mounted read-only). The
    # entrypoint guarantees these files exist (real LE cert, or a self-signed
    # placeholder on a fresh volume) before nginx starts.
    ssl_certificate     /certs/fullchain.pem;
    ssl_certificate_key /certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:1m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/_portal_locations.conf;
}
