# Captive portal nginx: serves the static Vite SPA and scope-proxies ONLY the
# portal tRPC procedures to the dashboard api.
#
# SECURITY BOUNDARY (www-q002): guests on the open guest WLAN are untrusted. The
# ONLY path that reaches the api is /api/trpc/portal.* — every other /api path
# 404s, so a guest can never invoke a dashboard procedure (lights/climate/Sonos).
# The api itself serves tRPC at /trpc (apps/api/src/server.ts), so the portal's
# /api/trpc namespace is rewritten to /trpc when proxied; the /api prefix is the
# portal's own front-door namespace and never reaches the api.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker/Swarm embedded DNS. Resolving the api upstream through a runtime
    # `resolver` + a variable proxy_pass (below) defers name resolution to request
    # time, so nginx still BOOTS when the api task is momentarily unresolvable
    # (rolling deploy, cold start) instead of aborting at startup with
    # "host not found in upstream" — the portal stays up and serves the SPA.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── The ONLY proxied path: portal tRPC procedures. ───────────────────────
    # Matches /api/trpc/portal.<proc> (incl. tRPC batches, which always start
    # with the first procedure name). The trailing rewrite strips the portal's
    # /api namespace so the api sees its real /trpc/portal.* endpoint.
    location ~ ^/api/trpc/portal\. {
        # /api/trpc/portal.sendCode -> /trpc/portal.sendCode
        rewrite ^/api(/trpc/portal\..*)$ $1 break;
        # Variable upstream so the hostname is resolved per-request via `resolver`
        # (a literal proxy_pass host is resolved once at startup and hard-fails if
        # absent). $portal_api is a plain var, not a captured group.
        set $portal_api api;
        proxy_pass http://$portal_api:4201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Everything else under /api is the dashboard surface: 404, never proxy.
    # This is the guest-VLAN boundary — a lights/climate/Sonos procedure hit
    # through the portal host dead-ends here (www-q002.14 verifies the 404).
    location /api/ {
        return 404;
    }

    # ── The SPA. try_files falls back to index.html so client-side routes (e.g.
    # the Terms screen) survive a refresh / deep link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Standard gzip for assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
