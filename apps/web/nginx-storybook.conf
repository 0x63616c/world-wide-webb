# Serves the Storybook static bundle on port 6006.

server {
    listen 6006;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # App shell + story index: always revalidate. After a deploy the bundle gets
    # new content hashes; a no-cache shell guarantees a reload fetches the fresh
    # index that points at the new chunk names, instead of a stale cached shell.
    location = /index.html  { add_header Cache-Control "no-cache"; }
    location = /iframe.html { add_header Cache-Control "no-cache"; }
    location = /index.json  { add_header Cache-Control "no-cache"; }

    # Content-hashed build assets are immutable. A MISS must 404 — it must NOT
    # fall back to index.html. Returning index.html for a removed chunk makes the
    # browser try to import HTML as a JS module, surfacing as
    # "Failed to fetch dynamically imported module" in any tab opened before a
    # deploy that rehashed chunks (CC-w4aa). An honest 404 + the no-cache shell
    # above means a reload always recovers cleanly.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Storybook navigates via ?path= query params, so any non-file path resolves
    # to the app shell. Real files (favicon, sb-manager assets, …) are served
    # first by $uri; only genuine routes fall through to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
