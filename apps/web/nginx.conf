# Serves the static Vite bundle and proxies /trpc → api:4201.
# API_HOST can be overridden at runtime; defaults to the swarm DNS name.
# www-5ag.9: web-only edit, verifies path-filtered CI rebuilds web alone.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # /trpc and /up are forwarded to the API container.
    location /trpc {
        proxy_pass http://api:4201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade support for tRPC subscriptions.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # All api media routes: now-playing artwork (www-dhhr), wake-photo upload
    # (POST /media/wake-photo) and wake-photo serving (/media/wake-photos/...).
    # The camera stream keeps its own longer-prefix block below with the
    # buffering overrides an MJPEG stream needs.
    location /media/ {
        proxy_pass http://api:4201;
        proxy_set_header Host $host;
        # Wake-photo burst frames are full-resolution JPEGs; the nginx default
        # cap of 1m would 413 a large frame.
        client_max_body_size 10m;
    }

    # Live camera MJPEG stream, proxied by the api from go2rtc.
    # The response is an endless multipart/x-mixed-replace body, so:
    #  - proxy_buffering MUST be off (nginx buffers by default and the tile stalls
    #    in prod even though it works fine through the Vite dev proxy),
    #  - proxy_read_timeout must be raised well past the 60s default or the stream
    #    dies every minute,
    #  - chunked encoding needs HTTP/1.1 upstream.
    location /media/camera-stream {
        proxy_pass http://api:4201;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        chunked_transfer_encoding on;
        gzip off;
    }

    location /up {
        proxy_pass http://api:4201/up;
        proxy_set_header Host $host;
    }

    # Basemap pmtiles (www-hn1i): static files only, NO SPA fallback. A missing
    # basemap must be a loud 404, the index.html fallback returned HTML with a
    # 200 that the pmtiles client choked on silently (blank Tesla map, nothing
    # in monitoring).
    location /maps/ {
        try_files $uri =404;
    }

    # All other paths serve the SPA, fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Standard gzip for assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
