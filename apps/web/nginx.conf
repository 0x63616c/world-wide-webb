# Serves the static Vite bundle and proxies /trpc → api:4201.
# API_HOST can be overridden at runtime; defaults to the swarm DNS name.
# CC-5ag.9: web-only edit, verifies path-filtered CI rebuilds web alone.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # /trpc and /up are forwarded to the API container.
    location /trpc {
        proxy_pass http://api:4201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade support for tRPC subscriptions.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Now-playing artwork proxy (CC-dhhr), streamed from HA by the api.
    location /media/tv-artwork {
        proxy_pass http://api:4201;
        proxy_set_header Host $host;
    }

    location /up {
        proxy_pass http://api:4201/up;
        proxy_set_header Host $host;
    }

    # Basemap pmtiles (CC-hn1i): static files only, NO SPA fallback. A missing
    # basemap must be a loud 404, the index.html fallback returned HTML with a
    # 200 that the pmtiles client choked on silently (blank Tesla map, nothing
    # in monitoring).
    location /maps/ {
        try_files $uri =404;
    }

    # All other paths serve the SPA, fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Standard gzip for assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
