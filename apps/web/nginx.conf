server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths serve index.html so the React router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy all tRPC and API calls to the api service inside the swarm.
    # API_HOST / API_PORT are substituted at container start via envsubst.
    location /trpc {
        proxy_pass http://${API_HOST}:${API_PORT};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Healthcheck endpoint — nginx responds directly, no upstream needed.
    location /up {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
