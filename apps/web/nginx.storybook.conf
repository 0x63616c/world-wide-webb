server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Storybook static site — serve assets and fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /up {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
