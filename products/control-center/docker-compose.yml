services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cc
      POSTGRES_PASSWORD: cc
      POSTGRES_DB: controlcenter
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cc -d controlcenter"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
