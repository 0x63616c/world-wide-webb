name: Release iOS (TestFlight)

# Ships a new TestFlight build on every push to main that touches the app's
# code or native/signing config - no git tags. The build number is derived from
# TestFlight (latest + 1), so no version bump is needed either. Adjust `paths`
# to match the repo layout. Also runnable manually (workflow_dispatch), plus a
# monthly cron to refresh the 90-day TestFlight build expiry.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "ios/**"
      - "capacitor.config.*"
      - "fastlane/**"
      - ".github/workflows/release-ios.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 12 1 * *" # 1st of each month, noon UTC - keep the build fresh

jobs:
  testflight:
    runs-on: macos-26 # Apple requires builds made with the iOS 26 SDK / Xcode 26;
    # macos-latest still ships Xcode 16.x, which App Store Connect rejects (409).
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Capacitor: build the web app and sync it into the iOS project.
      - name: Build web
        run: bun install --frozen-lockfile && bun run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
      - name: Capacitor sync
        run: bunx cap sync ios

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build & upload to TestFlight
        env:
          # ASC API key (account-level) - synced from 1Password by sync-secrets.sh.
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          # fastlane match: shared distribution cert in the certificates repo.
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          # App-specific.
          BUNDLE_ID: ${{ vars.BUNDLE_ID }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          IOS_PROJECT: ${{ vars.IOS_PROJECT }}
          IOS_SCHEME: ${{ vars.IOS_SCHEME }}
          INITIAL_BUILD_NUMBER: ${{ vars.INITIAL_BUILD_NUMBER }}
        run: bundle exec fastlane ios release
