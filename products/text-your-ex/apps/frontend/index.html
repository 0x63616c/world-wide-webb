<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Text Your Ex</title>
  <meta name="description" content="A shared guilt jar for friends trying not to text their exes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    html { background: #000; }
    body {
      background: #000;
      min-height: 100dvh;
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #fff;
    }
    /* dark scrollbars everywhere */
    ::-webkit-scrollbar { width: 0; height: 0; }
    * { scrollbar-width: none; }

    @keyframes tye-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes tye-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes tye-fall { to { transform: translateY(140vh) rotate(var(--rot)); opacity: 0; } }
    @keyframes tye-screen-in { from { transform: translateY(10px); } to { transform: translateY(0); } }
    @keyframes tye-eyebrow-in { from { opacity: 0; transform: translateY(8px); filter: blur(3px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
    .screen-anim { animation: tye-screen-in .26s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes tye-pop { 0%{transform:scale(.8);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
