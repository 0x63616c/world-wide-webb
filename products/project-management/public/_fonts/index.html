<!doctype html>
<html><head><meta charset="utf-8"><title>font options</title>
<style>
  body{margin:0;background:#000;color:#ededed;font-family:system-ui,sans-serif;padding:24px}
  h1{font-size:16px;font-weight:600;margin:0 0 4px}
  p{color:#a1a1a1;font-size:13px;margin:0 0 20px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  figure{margin:0;border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;background:#0a0a0a}
  figcaption{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.07);font-size:13px;font-weight:600}
  figcaption span{color:#6e6e6e;font-weight:400}
  img{display:block;width:100%}
</style></head>
<body>
  <h1>4 font options for beads-ui</h1>
  <p>Current is Space Grotesk. Pick one and I'll apply it. Same Issues view in each.</p>
  <div class="grid">
    <figure><figcaption>1 · Inter <span>— UI standard, most neutral/readable</span></figcaption><img src="font-inter.png"></figure>
    <figure><figcaption>2 · Geist <span>— Vercel's font, matches the aesthetic</span></figcaption><img src="font-geist.png"></figure>
    <figure><figcaption>3 · IBM Plex Sans <span>— readable with a bit of character</span></figcaption><img src="font-plex.png"></figure>
    <figure><figcaption>4 · System (SF Pro) <span>— native macOS, crisp</span></figcaption><img src="font-system.png"></figure>
  </div>
</body></html>
