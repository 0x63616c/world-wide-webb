@version: 4.2
@include "scl.conf"

# UniFi gateway/APs -> remote syslog over UDP or TCP 514 (accept both so we never
# miss it regardless of transport). no-parse keeps the raw vendor line intact;
# we prefix the received ISO timestamp + sender IP and write one file per day.
# Runs in the `unifi-syslog` container on the NAS (balabit/syslog-ng). www-dhi9.
source s_net {
    network(transport("udp") port(514) flags(no-parse));
    network(transport("tcp") port(514) flags(no-parse));
};

destination d_file {
    file("/output/${R_YEAR}-${R_MONTH}-${R_DAY}-unifi.log"
        template("${R_ISODATE} ${SOURCEIP} ${MSG}\n")
        create-dirs(yes)
    );
};

log { source(s_net); destination(d_file); };
